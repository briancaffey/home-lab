# magpie-tts-multilingual (NVIDIA Riva NIM) on a1 — Phase 4, the first real
# workload migrated from docker. The NGC key lives in Secret ngc-api-key,
# and nvcr.io pulls need the same key as a registry credential (create once:
#   kubectl -n inference-club create secret generic ngc-api-key \
#     --from-literal=api-key=<NGC_API_KEY>
#   kubectl -n inference-club create secret docker-registry ngc-registry \
#     --docker-server=nvcr.io --docker-username='$oauthtoken' \
#     --docker-password=<NGC_API_KEY>  ).
#
# Cutover note: a1's 4090 cannot hold two magpie copies (~13.7 GiB each with
# maxine's 3.2 GiB also resident), so the docker container must be stopped
# BEFORE this pod can load the model. hostPort 9000/50051 on a1 preserves the
# prod agent's hard-coded http://192.168.5.253:9000/v1 path across the swap;
# the in-cluster agent discovers the Service by labels and uses cluster DNS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magpie-tts
  namespace: inference-club
  labels:
    app: magpie-tts
spec:
  replicas: 1
  strategy:
    type: Recreate # 1 GPU + hostPort: old pod must die before the new one starts
  selector:
    matchLabels:
      app: magpie-tts
  template:
    metadata:
      labels:
        app: magpie-tts
    spec:
      nodeSelector:
        inference-club.com/box: a1
      runtimeClassName: nvidia
      imagePullSecrets:
        - name: ngc-registry
      # The /data hostPath (/mnt/d/magpie-data) is created by the kubelet as
      # root:root 0755, but the NIM's riva-deploy runs as a non-root user and
      # must mkdir /data/models inside it. Open the dir up before the NIM starts.
      # (The old emptyDir was world-writable, so this wasn't needed there.)
      initContainers:
        # Start from a CLEAN /data each boot. riva-deploy regenerates the Triton
        # model repo incrementally (it "skips copy" for files that already exist),
        # so a persisted-but-partial /data from a previous/interrupted build
        # produces an INCOMPLETE repo — Triton then dies with "File does not
        # exist: .../<voice>.pt … failed to load all models". Wiping guarantees a
        # full, consistent regenerate. (We keep /data on /mnt/d only for disk
        # space + to avoid the root-disk eviction; the NIM rebuilds engines every
        # start regardless, so there's nothing to preserve.) Also fixes perms:
        # the kubelet creates the hostPath root:root 0755 but the NIM runs
        # non-root and must mkdir under /data.
        - name: fix-perms
          image: busybox:1.38
          command: ["sh", "-c", "rm -rf /data/* /data/.[!.]* 2>/dev/null; mkdir -p /data && chmod 0777 /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: model-repo
              mountPath: /data
      containers:
        - name: magpie-tts
          # same image + tag the docker copy runs, sharing its /mnt/d/nim cache
          image: nvcr.io/nim/nvidia/magpie-tts-multilingual:latest
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-key
                  key: api-key
            - name: NIM_HTTP_API_PORT
              value: "9000"
            - name: NIM_GRPC_API_PORT
              value: "50051"
            - name: NIM_TAGS_SELECTOR
              value: "name=magpie-tts-multilingual,batch_size=8"
          ports:
            - name: http
              containerPort: 9000
              hostPort: 9000
            - name: grpc
              containerPort: 50051
              hostPort: 50051
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
            # riva-deploy regenerates the Triton repo + TRT engines into /data on
            # EVERY start (~17 min; this NIM does not reuse a prebuilt repo). /data
            # MUST live on the big /mnt/d disk, NOT the node root disk: a1's root
            # (/dev/sda2) runs ~94% full and the multi-GiB build on a root-backed
            # emptyDir evicted the pod for ephemeral-storage pressure. The dir is
            # wiped clean each boot by the fix-perms initContainer — it's just
            # build scratch (a persisted partial repo makes Triton fail to load).
            - name: model-repo
              mountPath: /data
          startupProbe:
            # A cold start (rmir download + TRT engine build, e.g. after the
            # nim cache is wiped) rebuilds engines into the ephemeral /data
            # and needs well over the warm-cache few minutes — budget 40 min
            # or the kubelet kills the pod mid-build and it loops forever.
            httpGet:
              path: /v1/health/ready
              port: http
            periodSeconds: 10
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            periodSeconds: 15
          livenessProbe:
            # The TRT-LLM executor thread can DIE on certain inputs (e.g. text in
            # a script not in the model dictionary — Chinese chars get dropped,
            # leaving an input too short for the attention window → fatal
            # assertion in forwardAsync). The HTTP server then wedges (health
            # times out) but the container keeps "running" with no restart. A
            # liveness probe restarts it automatically. Gated by startupProbe, so
            # it never fires during the long first-load/engine build.
            httpGet:
              path: /v1/health/ready
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: nim-cache
          hostPath:
            path: /mnt/d/nim
            type: Directory
        - name: model-repo
          hostPath:
            path: /mnt/d/magpie-data
            type: DirectoryOrCreate
---
# Discovery: the in-cluster agent finds this Service by labels and reports
# url http://magpie-tts.inference-club.svc.cluster.local:9000/v1, plus the
# exact image/command/pod status from the backing pod (see 02-k8s-discovery.md).
apiVersion: v1
kind: Service
metadata:
  name: magpie-tts
  namespace: inference-club
  labels:
    inference-club.com/managed: "true"
    inference-club.com/type: tts
    inference-club.com/engine: other
  annotations:
    inference-club.com/base-path: /v1
    inference-club.com/models: |
      - id: magpie-tts-multilingual
        input_modalities: [text]
        output_modalities: [audio]
spec:
  selector:
    app: magpie-tts
  ports:
    - name: http
      port: 9000
