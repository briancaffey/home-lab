# Nemotron-3 Nano Omni 30B (A3B, NVFP4) on spark (arm64/GB10) — multimodal
# (text+image+audio+video) reasoning LLM served by vLLM's OpenAI-compatible
# server. Converted 1:1 from the upstream `docker run` recipe:
#
#   docker run -it --rm --pull always --runtime=nvidia --network host -p 8000:8000 \
#     --ipc=host -v $HOME/.cache/huggingface:/root/.cache/huggingface \
#     -e VLLM_FLASHINFER_MOE_BACKEND=latency --entrypoint bash \
#     vllm/vllm-openai:nightly -c "pip install ... && vllm serve ..."
#
# Mapping notes:
#   --runtime=nvidia       -> runtimeClassName: nvidia
#   --ipc=host             -> spec.hostIPC: true (vLLM needs large /dev/shm)
#   --network host -p 8000 -> containerPort 8000 + hostPort 8000 (repo convention:
#                             reach it at <spark-LAN-IP>:8000, here 192.168.6.19:8000)
#   --runtime=nvidia + GPU -> resources.limits nvidia.com/gpu: 1 (spark advertises
#                             exactly 1; claimed exclusively now that acestep/
#                             nemotron-asr/trellis2 are scaled to 0)
#   -v ~/.cache/huggingface-> hostPath /home/brian/.cache/huggingface (shared with
#                             the other spark services' HF cache)
#   --entrypoint bash -c   -> command: [bash, -c], args: <the pip-install + serve script>
#
# The nightly image is multi-arch (linux/arm64 manifest present), so it pulls on
# GB10. NVFP4 (--quantization fp4) requires Blackwell — GB10 qualifies.
#
# DEVIATION from the docker recipe: --gpu-memory-utilization lowered 0.85 -> 0.75.
# GB10 has UNIFIED memory (121.69 GiB shared CPU+GPU); at startup only ~98 GiB is
# free (OS reservation + a host LM Studio process holding ~10 GiB), so 0.85
# (103.44 GiB) failed with "Free memory ... less than desired GPU memory
# utilization". 0.75 (~91 GiB) fits with headroom; the 30B NVFP4 weights (~15 GiB)
# + KV cache need far less than that.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron-omni
  namespace: inference-club
  labels:
    app: nemotron-omni
spec:
  # Running alongside lmstudio-headless (Qwen3.6-27B) and acestep on the single
  # GB10 GPU. The GPU is SHARED via runtimeClassName: nvidia (unified memory) —
  # see the resources note below — so this does NOT claim the device-plugin slot.
  replicas: 1
  strategy:
    type: Recreate # single GPU on spark; old pod must release it before the new one starts
  selector:
    matchLabels:
      app: nemotron-omni
  template:
    metadata:
      labels:
        app: nemotron-omni
    spec:
      nodeSelector:
        inference-club.com/box: spark
      runtimeClassName: nvidia
      hostIPC: true # mirrors docker --ipc=host; vLLM uses large shared memory
      containers:
        - name: nemotron-omni
          image: vllm/vllm-openai:nightly
          imagePullPolicy: Always # mirrors docker --pull always
          env:
            - name: VLLM_FLASHINFER_MOE_BACKEND
              value: latency
            - name: HF_HOME
              value: /root/.cache/huggingface
            # Tunables for the vllm serve command below. Edit these and re-apply
            # to change concurrency / context length / memory budget.
            - name: MAX_NUM_SEQS # max concurrent/parallel requests
              value: "8"
            - name: MAX_MODEL_LEN # max context length (prompt + output)
              value: "64000"
            - name: GPU_MEM_UTIL
              # Fraction of the 121.69 GiB UNIFIED GB10 memory vLLM may claim.
              # Lowered from 0.75 (~91 GiB, when nemotron owned the GPU) to ~0.40
              # (~48 GiB) so it coexists with lmstudio-headless + acestep, which
              # already hold ~44 GiB. ~15 GiB weights leaves ample fp8 KV cache
              # for 8 seqs x 64k (the model is mostly Mamba, so KV is small).
              value: "0.40"
          command: ["bash", "-c"]
          # Verbatim port of the docker `-c` script: install audio extras + the
          # cuda runtime wheel, fix LD_LIBRARY_PATH, then `vllm serve`. Backslash
          # line-continuations keep the `vllm serve` flags one shell command.
          args:
            - |
              pip install -q nvidia-cuda-runtime-cu12 'vllm[audio]' && \
              export LD_LIBRARY_PATH=/usr/local/lib/python3.12/dist-packages/nvidia/cuda_runtime/lib:$LD_LIBRARY_PATH && \
              vllm serve nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4 \
                --served-model-name nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4 nemotron-3-nano-omni \
                --tensor-parallel-size 1 \
                --port 8000 --host 0.0.0.0 \
                --max-model-len "$MAX_MODEL_LEN" \
                --max-num-seqs "$MAX_NUM_SEQS" \
                --max-num-batched-tokens 32768 \
                --gpu-memory-utilization "$GPU_MEM_UTIL" \
                --quantization fp4 \
                --moe-backend marlin \
                --kv-cache-dtype fp8 \
                --mamba-ssm-cache-dtype float32 \
                --enable-prefix-caching \
                --reasoning-parser nemotron_v3 \
                --enable-auto-tool-choice \
                --tool-call-parser qwen3_coder \
                --video-pruning-rate 0.5 \
                --limit-mm-per-prompt '{"video":1,"image":1,"audio":1}' \
                --media-io-kwargs '{"video":{"fps":2,"num_frames":256}}' \
                --allowed-local-media-path / \
                --trust-remote-code
          ports:
            - name: http
              containerPort: 8000
              hostPort: 8000
          # NOTE: no `nvidia.com/gpu` device-plugin claim. The spark advertises
          # exactly 1 GPU slot and acestep holds it; claiming it here would leave
          # this pod Pending. Instead we share the physical GB10 GPU via
          # runtimeClassName: nvidia (unified memory) — the same pattern as
          # lmstudio-headless. GPU_MEM_UTIL above bounds our share of memory.
          resources: {}
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          startupProbe:
            # First run: pip install + pull the ~30B NVFP4 weights + load. vLLM
            # exposes /health once the engine is up. Budget generously (~60 min):
            # 15s * 240 = 3600s before declaring failure.
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
      volumes:
        - name: hf-cache
          hostPath:
            path: /home/brian/.cache/huggingface
            type: Directory
---
# ClusterIP service for in-cluster DNS (nemotron-omni.inference-club:8000) AND
# agent discovery. Labelled inference-club.com/managed so the agent (kubernetes
# discovery mode) auto-registers it on prod inference.club. vLLM is
# OpenAI-compatible at /v1 (chat/completions, models, etc.).
#
# The served-model id below matches `--served-model-name` in the Deployment; the
# agent uses it verbatim to route /v1 requests to this backend.
apiVersion: v1
kind: Service
metadata:
  name: nemotron-omni
  namespace: inference-club
  labels:
    app: nemotron-omni
    inference-club.com/managed: "true"
    inference-club.com/type: llm
    inference-club.com/engine: vllm
  annotations:
    inference-club.com/base-path: /v1
    inference-club.com/models: |
      - id: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4
        hf: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4
        name: Nemotron 3 Nano Omni 30B
        input_modalities: [text, image, audio, video]
        output_modalities: [text]
        features: [reasoning, tools]
        context_length: 64000
        quantization: fp4
spec:
  selector:
    app: nemotron-omni
  ports:
    - name: http
      port: 8000
      targetPort: http
