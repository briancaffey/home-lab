# Qwen3.6-27B (NVFP4) — dense, multimodal + reasoning + tools — served by vLLM
# on the GB10. NVFP4 counterpart to the LM Studio GGUF path in
# services/lmstudio-headless (qwen/qwen3.6-27b as GGUF). One at a time on the
# single GB10: scale lmstudio-headless (and any other spark GPU user) to 0 first.
#
# vLLM version: :nightly for the first load — NVFP4 on Blackwell/GB10 is new and
# best-supported on nightly (same reason as the Nemotron sibling). Once it loads
# cleanly you can pin a stable :vX.Y.Z here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-llm
spec:
  template:
    spec:
      containers:
        - name: vllm
          # Pinned to the known-good cached digest. The :nightly tag moved on
          # Docker Hub and its new layers truncate on pull from spark ("short
          # read: unexpected EOF"), which wedged every pod roll while the old,
          # complete image sat in containerd's cache — and with the Recreate
          # strategy (single GB10) that means an outage on any spec change.
          # This exact digest ran here for 7 days. To adopt a newer build, pull
          # it somewhere with reliable Docker Hub egress and pin its digest (or
          # a :vX.Y.Z tag) here.
          image: vllm/vllm-openai@sha256:479c3b5c4be836b716bf7b65a9755ceb5145ee30ad3e8afd7832366dcee60c92
          # IfNotPresent → use cached content, never contact the registry.
          imagePullPolicy: IfNotPresent
          env:
            - name: MAX_NUM_SEQS
              value: "4"
            - name: MAX_MODEL_LEN
              value: "32768"
            - name: GPU_MEM_UTIL
              value: "0.75" # owns the GPU one-at-a-time
          args:
            - |
              vllm serve nvidia/Qwen3.6-27B-NVFP4 \
                --served-model-name nvidia/Qwen3.6-27B-NVFP4 qwen3.6-27b \
                --tensor-parallel-size 1 \
                --port 8000 --host 0.0.0.0 \
                --max-model-len "$MAX_MODEL_LEN" \
                --max-num-seqs "$MAX_NUM_SEQS" \
                --gpu-memory-utilization "$GPU_MEM_UTIL" \
                --quantization modelopt_fp4 \
                --kv-cache-dtype fp8 \
                --enable-prefix-caching \
                --enable-auto-tool-choice \
                --tool-call-parser hermes \
                --reasoning-parser qwen3 \
                --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20,"presence_penalty":1.0}' \
                --limit-mm-per-prompt '{"image":1}' \
                --trust-remote-code
