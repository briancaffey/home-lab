apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: inference-club
resources:
  - ../../base
patches:
  - path: deployment.yaml # image + env + the vllm serve recipe
    target:
      kind: Deployment
      name: spark-llm
  - path: service.yaml # discovery annotation
    target:
      kind: Service
      name: spark-llm
