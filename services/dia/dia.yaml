# Dia voice-cloning / text-to-dialogue (nari-labs/Dia-1.6B) — the voice-cloning
# service behind inference.club's /v1/voice/generations (see
# inference.club/docs/prd/09-voice-cloning.md). Image is built from the dia
# service repo and pushed to ghcr.io/inference-club/dia (PRIVATE — pulls need
# Secret ghcr-pull, same as acestep).
#
# STORAGE (Longhorn toe-dip, docs/16 · brian/home-lab#27): weights live on the
# replicated RWX `dia-models` volume (pvc.yaml) — downloaded ONCE by
# download-job.yaml, then mounted simultaneously by BOTH deployments below.
# Two single-replica deployments (one per pinned node) instead of replicas: 2,
# because each pod must claim its own node's GPU. The shared `app: dia` label
# means the Service round-robins across whichever pods are up.
#
# GPU: each pod claims the node's 4090 exclusively (`nvidia.com/gpu: 1`).
# a2/a3's GPUs are freed by scaling down flux2-klein / ltx2; scale dia-a2 or
# dia-a3 to 0 to hand a GPU back.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dia-a2
  namespace: inference-club
  labels:
    app: dia
spec:
  replicas: 1
  strategy:
    type: Recreate # single GPU resource; old pod must release it before the new one starts
  selector:
    matchLabels:
      app: dia
      box: a2
  template:
    metadata:
      labels:
        app: dia
        box: a2
    spec:
      nodeSelector:
        inference-club.com/box: a2
      runtimeClassName: nvidia
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dia
          image: ghcr.io/inference-club/dia:latest
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8491"
            - name: DIA_MODEL
              value: nari-labs/Dia-1.6B-0626
            # HF cache on the shared replicated volume (pre-warmed by the
            # download Job — pods only read weights + write lock files).
            - name: HF_HOME
              value: /cache
          ports:
            - name: http
              containerPort: 8491
              # Exposed on the node's LAN IP so the local-dev static-manifest
              # agent (club-host-dev) can reach Dia at <node-ip>:8491, the same
              # node-IP:hostPort pattern the other services use.
              hostPort: 8491
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: models
              mountPath: /cache
          startupProbe:
            # Weights are pre-downloaded; loading them streams over the RWX
            # NFS mount (WiFi LAN) — budget minutes, not seconds.
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: dia-models
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dia-a3
  namespace: inference-club
  labels:
    app: dia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dia
      box: a3
  template:
    metadata:
      labels:
        app: dia
        box: a3
    spec:
      nodeSelector:
        inference-club.com/box: a3
      runtimeClassName: nvidia
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dia
          image: ghcr.io/inference-club/dia:latest
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8491"
            - name: DIA_MODEL
              value: nari-labs/Dia-1.6B-0626
            - name: HF_HOME
              value: /cache
          ports:
            - name: http
              containerPort: 8491
              hostPort: 8491
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: models
              mountPath: /cache
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: dia-models
---
# Discovery: type=tts + features=voice-cloning routes /v1/voice/generations
# here (the agent indexes a voice-cloning tts service under a synthetic "voice"
# type, so Dia is chosen over a plain Riva tts service). Dia serves a single
# POST /generate at the BASE url — so no base-path annotation, like ACE-Step.
# Selector matches app=dia on BOTH deployments → round-robins a2/a3.
apiVersion: v1
kind: Service
metadata:
  name: dia
  namespace: inference-club
  labels:
    inference-club.com/managed: "true"
    inference-club.com/type: tts
    inference-club.com/engine: other
  annotations:
    inference-club.com/features: voice-cloning,dialogue
    inference-club.com/models: |
      - id: dia-1.6b
        name: Dia 1.6B (voice cloning)
        input_modalities: [text, audio]
        output_modalities: [audio]
        features: [voice-cloning, dialogue]
spec:
  selector:
    app: dia
  ports:
    - name: http
      port: 8491
      targetPort: http
