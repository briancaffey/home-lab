# LM Studio on the spark HOST (outside k8s) — represented via a selector-less
# Service + manual EndpointSlice so the agent discovers it like anything else.
# First light for kubernetes discovery: zero workloads migrated, one service
# reported. The upstream api key lives in Secret lmstudio-key (create it once:
#   kubectl -n inference-club create secret generic lmstudio-key \
#     --from-literal=api-key=<LM Studio key>  ).
apiVersion: v1
kind: Service
metadata:
  name: lmstudio
  namespace: inference-club
  labels:
    inference-club.com/managed: "true"
    inference-club.com/type: llm
    inference-club.com/engine: lmstudio
  annotations:
    inference-club.com/base-path: /v1
    inference-club.com/api-key-secret: lmstudio-key
    # No models declared: the Spark GPU now serves nemotron-omni via vLLM, so
    # nothing is exposed through LM Studio on prod. The agent only reports
    # models listed here (it does NOT live-probe LM Studio's /v1/models), so an
    # empty list hides everything LM Studio still has downloaded (incl. the
    # unloaded google/gemma-4-12b). Re-add entries here to expose a model.
    inference-club.com/models: |
      []
spec:
  ports:
    - name: http
      port: 1234
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: lmstudio-1
  namespace: inference-club
  labels:
    kubernetes.io/service-name: lmstudio
addressType: IPv4
ports:
  - name: http
    port: 1234
endpoints:
  - addresses: ["192.168.6.19"]
