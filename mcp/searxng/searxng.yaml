# SearXNG — private, key-less metasearch (Phase D, docs/04). Backs a web-search MCP
# server with no API keys or rate limits. JSON output is enabled (required for
# programmatic / MCP use). Uses the shared platform Redis for caching. Official
# multi-arch image, no pull secret. Stateless → pinned to a1 to spread load off a3.
#
# The official entrypoint substitutes the `ultrasecretkey` placeholder in settings
# with the SEARXNG_SECRET env var on boot, so the real key stays in a Secret.
#
# Search UI / API : searxng.mcp.svc.cluster.local:8080   (NodePort 30808)
# JSON query      : http://<a1-ip>:30808/search?q=<query>&format=json
#
# Secret (create once):
#   kubectl -n mcp create secret generic searxng-secret \
#     --from-literal=secret-key=$(openssl rand -hex 32)
#
# Deploy:  kubectl apply -f mcp/searxng/searxng.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: mcp
data:
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "ultrasecretkey"   # replaced at boot from $SEARXNG_SECRET
      limiter: false
      image_proxy: true
    search:
      formats:
        - html
        - json
    redis:
      url: redis://redis.platform.svc.cluster.local:6379/0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: mcp
  labels: { app: searxng }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: searxng }
  template:
    metadata:
      labels: { app: searxng }
    spec:
      nodeSelector: { inference-club.com/box: a1 }
      # k8s injects Docker-link env vars named <SVCNAME>_PORT=tcp://ip:port for
      # every service; SearXNG reads $SEARXNG_PORT as its listen port and chokes on
      # the tcp:// URL. Disable the legacy injection (we use cluster DNS anyway).
      enableServiceLinks: false
      containers:
        - name: searxng
          image: searxng/searxng:latest
          env:
            - { name: SEARXNG_BASE_URL, value: "http://searxng.mcp.svc.cluster.local:8080/" }
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef: { name: searxng-secret, key: secret-key }
          ports: [{ name: http, containerPort: 8080 }]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - { name: settings, mountPath: /etc/searxng }
      volumes:
        - name: settings
          configMap: { name: searxng-settings }
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: mcp
  labels: { app: searxng }
spec:
  type: NodePort
  selector: { app: searxng }
  ports:
    - { name: http, port: 8080, targetPort: http, nodePort: 30808 }
