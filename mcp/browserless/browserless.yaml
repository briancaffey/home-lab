# browserless/chromium — headless browser grid (Phase D, docs/04). Backs a
# browser-automation MCP (Playwright/Puppeteer over WebSocket) and complements
# firecrawl: firecrawl scrapes URLs → markdown, browserless drives real browser
# sessions (clicks, forms, screenshots, PDF). Official multi-arch image, no pull
# secret. Memory-hungry under load → pinned to a1, capped at 2Gi.
#
# Connect : ws://browserless.mcp.svc.cluster.local:3000?token=<TOKEN>
# Debugger: http://<a1-ip>:30330   (NodePort)
#
# Secret (create once):
#   kubectl -n mcp create secret generic browserless-secret \
#     --from-literal=token=$(openssl rand -hex 16)
#
# Deploy:  kubectl apply -f mcp/browserless/browserless.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browserless
  namespace: mcp
  labels: { app: browserless }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: browserless }
  template:
    metadata:
      labels: { app: browserless }
    spec:
      nodeSelector: { inference-club.com/box: a1 }
      containers:
        - name: browserless
          image: ghcr.io/browserless/chromium:latest
          env:
            - { name: PORT, value: "3000" }
            - { name: CONCURRENT, value: "3" }
            - { name: TIMEOUT, value: "60000" }
            - name: TOKEN
              valueFrom:
                secretKeyRef: { name: browserless-secret, key: token }
          ports: [{ name: http, containerPort: 3000 }]
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { memory: 2Gi }
          readinessProbe:
            httpGet: { path: /docs, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: browserless
  namespace: mcp
  labels: { app: browserless }
spec:
  type: NodePort
  selector: { app: browserless }
  ports:
    - { name: http, port: 3000, targetPort: http, nodePort: 30330 }
