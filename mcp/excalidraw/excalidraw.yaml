# Excalidraw — self-hosted diagram canvas (Phase D, docs/04). Pairs with the
# `excalidraw-diagram-generator` Claude skill and an Excalidraw MCP server (run the
# MCP server alongside Claude, pointed at this canvas) for create/update/persist of
# diagrams. Official multi-arch image, no pull secret. Stateless front-end (scenes
# live client-side / in the MCP server's store) → pinned to a1.
#
# Canvas : excalidraw.mcp.svc.cluster.local:80   (NodePort 30505 → http://<a1-ip>:30505)
#
# Deploy:  kubectl apply -f mcp/excalidraw/excalidraw.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  namespace: mcp
  labels: { app: excalidraw }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: excalidraw }
  template:
    metadata:
      labels: { app: excalidraw }
    spec:
      nodeSelector: { inference-club.com/box: a1 }
      containers:
        - name: excalidraw
          image: excalidraw/excalidraw:latest
          ports: [{ name: http, containerPort: 80 }]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: excalidraw
  namespace: mcp
  labels: { app: excalidraw }
spec:
  type: NodePort
  selector: { app: excalidraw }
  ports:
    - { name: http, port: 80, targetPort: http, nodePort: 30505 }
