# LiteLLM proxy — the keystone LLM gateway (Phase B, docs/04). One OpenAI-compatible
# endpoint in front of every model the cluster can reach: in-cluster vLLM/LM Studio
# AND free cloud providers (NVIDIA NIM, OpenRouter, Groq) used as automatic fallback.
# Per-key budgets, fallback routing, and full tracing exported to Phoenix via OTLP.
# Point Claude, Open WebUI, the inference.club apps, and the agent at this one URL.
#
# DB-backed: DATABASE_URL (postgres.platform) unlocks the Admin UI + virtual keys +
# spend tracking. Config below is the bootstrap (master key, models, routing); the
# UI persists any models/keys you add at runtime into Postgres (STORE_MODEL_IN_DB).
#
# API : litellm.observability.svc.cluster.local:4000   (NodePort 30400)
# UI  : https://litellm.lan/ui   (or http://<a3-ip>:30400/ui) — log in with the master key
#
# Secrets (create once — see the deploy notes at the top of this file):
#   litellm-secret      : master-key, database-url            (required)
#   litellm-providers   : nvidia/openrouter/groq api keys     (optional; fallbacks)
#
# Add a provider key later, then restart:
#   kubectl -n observability create secret generic litellm-providers \
#     --from-literal=groq-api-key=gsk_... \
#     --from-literal=openrouter-api-key=sk-or-... \
#     --from-literal=nvidia-api-key=nvapi-... \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n observability rollout restart deploy/litellm
#
# Deploy:  kubectl apply -f observability/litellm/litellm.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: observability
data:
  # Rampart PII guard (Forgejo issue #26): redacts user text via the in-cluster
  # rampart service (clusters/home/rampart) before it reaches CLOUD providers.
  # Two layers because LiteLLM routing has two leak paths:
  #   1. pre_call guardrail  — attached per-model to the cloud entries below;
  #      catches requests that name a cloud model directly.
  #   2. pre-call DEPLOYMENT hook — runs after the router picks a deployment
  #      (including silent fallbacks local→cloud) and redacts whenever the
  #      target is not local. This is the one that guards the fallback path.
  # Local targets (svc.cluster.local / 192.168.x / *.lan) are never redacted.
  rampart_guardrail.py: |
    """Rampart PII guardrail for the LiteLLM proxy.

    Calls the in-cluster rampart service's /protect-messages endpoint, which
    replaces PII with stable placeholders ([GIVEN_NAME_1], [SSN_1], ...) using
    the nationaldesignstudio/rampart ONNX model + deterministic recognizers.

    Fail-closed by default: if rampart is unreachable, cloud-bound requests
    error rather than leak. Set on_error: "allow" in litellm_params to relax.
    """
    import os

    import httpx
    from litellm._logging import verbose_proxy_logger
    from litellm.integrations.custom_guardrail import CustomGuardrail
    from litellm.types.guardrails import GuardrailEventHooks

    RAMPART_URL = os.environ.get(
        "RAMPART_URL", "http://rampart.rampart.svc.cluster.local:8080"
    )
    # Anything whose api_base matches these is in-cluster/LAN → no redaction.
    LOCAL_MARKERS = (".svc.cluster.local", "192.168.", ".lan", "localhost", "127.0.0.1")


    def _is_local_target(api_base: str | None) -> bool:
        if not api_base:
            return False  # no api_base → SaaS SDK route (groq/, openrouter/) → cloud
        return any(m in api_base for m in LOCAL_MARKERS)


    async def _redact_messages(messages: list) -> list:
        async with httpx.AsyncClient(timeout=15.0) as client:
            resp = await client.post(
                f"{RAMPART_URL}/protect-messages", json={"messages": messages}
            )
            resp.raise_for_status()
            body = resp.json()
        if body.get("placeholders"):
            verbose_proxy_logger.info(
                "rampart: redacted %s", ", ".join(body["placeholders"])
            )
        return body["messages"]


    class RampartGuard(CustomGuardrail):
        def __init__(self, **kwargs):
            self.on_error = kwargs.pop("on_error", "block")
            super().__init__(**kwargs)

        async def _guard(self, data: dict, where: str) -> dict:
            messages = data.get("messages")
            if not messages:
                return data
            try:
                data["messages"] = await _redact_messages(messages)
            except Exception as err:
                if self.on_error == "allow":
                    verbose_proxy_logger.warning(
                        "rampart unreachable (%s) — passing through UNREDACTED: %s",
                        where, err,
                    )
                    return data
                raise Exception(
                    f"rampart PII guard failed ({where}): {err} — blocking "
                    "cloud-bound request (fail-closed; set on_error: allow to relax)"
                ) from err
            return data

        # Layer 1: requests that name a cloud model directly. Runs only when the
        # guardrail is attached (per-model `guardrails:` below or per-request).
        async def async_pre_call_hook(self, user_api_key_dict, cache, data, call_type):
            if self.should_run_guardrail(data=data, event_type=GuardrailEventHooks.pre_call) is not True:
                return data
            return await self._guard(data, "pre_call")

        # Layer 2: after the router picks a deployment — including fallback
        # hops — redact whenever the destination is not local. This is what
        # keeps a nemotron-omni request that falls back to Groq from leaking.
        async def async_pre_call_deployment_hook(self, kwargs: dict, call_type=None):
            litellm_params = kwargs.get("litellm_params") or {}
            api_base = litellm_params.get("api_base") or kwargs.get("api_base")
            model = kwargs.get("model") or ""
            if _is_local_target(api_base):
                return kwargs
            return await self._guard(kwargs, f"deployment:{model}")

  config.yaml: |
    model_list:
      # ── In-cluster (primary, free, private) ───────────────────────────────
      # vLLM nemotron-omni on spark. vLLM ignores auth, so api_key is a stub.
      - model_name: nemotron-omni
        litellm_params:
          model: openai/nemotron-3-nano-omni
          api_base: http://nemotron-omni.inference-club.svc.cluster.local:8000/v1
          api_key: "vllm-local"
      # LM Studio host process (scaled to 0 today). Wildcard passthrough so
      # whichever model LM Studio has loaded just works when it's up.
      - model_name: lmstudio/*
        litellm_params:
          model: openai/*
          api_base: http://lmstudio.inference-club.svc.cluster.local:1234/v1
          api_key: "lm-studio"

      # ── Free cloud providers (backup / burst capacity) ────────────────────
      # Keys are optional: if the env var is empty the model simply errors at
      # call time and the router falls through to the next backend.
      # Groq — very fast Llama 3.3 70B.
      - model_name: groq-llama-3.3-70b
        litellm_params:
          model: groq/llama-3.3-70b-versatile
          api_key: os.environ/GROQ_API_KEY
          guardrails: ["rampart-pii"]
      # OpenRouter — broad catalogue; this points at a free model with a huge
      # (1M) context window, which is why it's the context-window fallback.
      # OpenRouter rotates free model ids — if it 404s, pick another :free model
      # (curl https://openrouter.ai/api/v1/models) and swap the id here or in the UI.
      - model_name: openrouter-nemotron-ultra
        litellm_params:
          model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
          api_key: os.environ/OPENROUTER_API_KEY
          guardrails: ["rampart-pii"]
      # NVIDIA NIM (build.nvidia.com) — OpenAI-compatible at integrate.api.nvidia.com.
      - model_name: nvidia-nemotron-super
        litellm_params:
          model: openai/nvidia/llama-3.3-nemotron-super-49b-v1
          api_base: https://integrate.api.nvidia.com/v1
          api_key: os.environ/NVIDIA_API_KEY
          guardrails: ["rampart-pii"]

    # Routing & fallbacks. The local nemotron is preferred; if it's down or scaled
    # to 0, requests transparently fall through to the free cloud backends in order.
    # Hit model_name "nemotron-omni" and you always get an answer.
    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 2
      timeout: 120
      fallbacks:
        - nemotron-omni: ["groq-llama-3.3-70b", "openrouter-nemotron-ultra", "nvidia-nemotron-super"]
      # If a prompt exceeds the local 64k window, spill to a bigger-context backend.
      context_window_fallbacks:
        - nemotron-omni: ["openrouter-nemotron-ultra", "groq-llama-3.3-70b"]

    # Rampart PII guard (see rampart_guardrail.py above). Attached per-model to
    # the cloud entries; its deployment hook additionally guards fallback hops.
    guardrails:
      - guardrail_name: rampart-pii
        litellm_params:
          guardrail: rampart_guardrail.RampartGuard
          mode: pre_call
          on_error: block   # fail-closed: no rampart → no cloud call

    litellm_settings:
      # Export every request as an OTLP trace to Phoenix.
      callbacks: ["otel"]
      drop_params: true
      # Don't let one slow/broken backend hang the gateway.
      request_timeout: 600

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      # DB-backed mode: virtual keys, spend tracking, and the Admin UI.
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: observability
  labels: { app: litellm }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: litellm }
  template:
    metadata:
      labels: { app: litellm }
    spec:
      nodeSelector: { inference-club.com/box: a3 }
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
          env:
            # Make the configmap-mounted rampart_guardrail.py importable.
            - { name: PYTHONPATH, value: "/etc/litellm" }
            - { name: RAMPART_URL, value: "http://rampart.rampart.svc.cluster.local:8080" }
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef: { name: litellm-secret, key: master-key }
            # Postgres (platform ns) — enables the Admin UI + virtual keys.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: litellm-secret, key: database-url }
            - { name: STORE_MODEL_IN_DB, value: "True" }
            # Behind Traefik TLS termination: trust X-Forwarded-Proto so the app
            # emits https:// redirects (not http://) for /ui etc. Pairs with the
            # redirect-https Middleware on the ingress so the bare host is secure.
            - { name: FORWARDED_ALLOW_IPS, value: "*" }
            # Free-provider keys (optional — proxy boots even when unset/empty).
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef: { name: litellm-providers, key: groq-api-key, optional: true }
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef: { name: litellm-providers, key: openrouter-api-key, optional: true }
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef: { name: litellm-providers, key: nvidia-api-key, optional: true }
            # OTLP → Phoenix (same namespace).
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://phoenix-svc.observability.svc.cluster.local:4317" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "grpc" }
          ports: [{ name: http, containerPort: 4000 }]
          resources:
            # DB-backed mode (Prisma client + proxy) needs more headroom than the
            # old stateless 1Gi — it OOMKilled at boot. 2Gi is comfortable.
            requests: { cpu: 100m, memory: 512Mi }
            limits: { memory: 2Gi }
          # DB migrations run on first boot; give it room before probing.
          startupProbe:
            httpGet: { path: /health/liveliness, port: http }
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /health/liveliness, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - { name: config, mountPath: /etc/litellm }
      volumes:
        - name: config
          configMap: { name: litellm-config }
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: observability
  labels: { app: litellm }
spec:
  type: NodePort
  selector: { app: litellm }
  ports:
    - { name: http, port: 4000, targetPort: http, nodePort: 30400 }
