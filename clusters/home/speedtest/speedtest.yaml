# Speedtest Tracker — scheduled WAN/ISP speed monitoring at https://speedtest.lan/.
# Runs Ookla's speedtest CLI on a schedule, stores history in embedded SQLite, and
# exposes /prometheus metrics that Prometheus scrapes into Grafana.
#
# Pinned to a2 (WIRED uplink). Deliberately NOT a1 — a1's flaky USB WiFi would
# measure the bad link instead of the real WAN.
#
# Secret (create once):
#   kubectl -n speedtest create secret generic speedtest-secrets \
#     --from-literal=APP_KEY="base64:$(openssl rand -base64 32)"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: speedtest-config
  namespace: speedtest
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest
  namespace: speedtest
  labels: { app: speedtest }
spec:
  replicas: 1
  strategy: { type: Recreate }   # single writer over the SQLite config volume
  selector:
    matchLabels: { app: speedtest }
  template:
    metadata:
      labels: { app: speedtest }
    spec:
      nodeSelector:
        inference-club.com/box: a2
      containers:
        - name: speedtest
          image: lscr.io/linuxserver/speedtest-tracker:latest
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ, value: "Etc/UTC" }
            - { name: APP_URL, value: "https://speedtest.lan" }
            - { name: DB_CONNECTION, value: "sqlite" }
            # hourly WAN test (cron); adjust to taste
            - { name: SPEEDTEST_SCHEDULE, value: "0 * * * *" }
            - name: APP_KEY
              valueFrom:
                secretKeyRef: { name: speedtest-secrets, key: APP_KEY }
          ports:
            - { name: http, containerPort: 80 }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
          volumeMounts:
            - { name: config, mountPath: /config }
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: speedtest-config }
---
apiVersion: v1
kind: Service
metadata:
  name: speedtest
  namespace: speedtest
  labels: { app: speedtest }
spec:
  selector: { app: speedtest }
  ports:
    - { name: http, port: 80, targetPort: http }
