# In-cluster agent → PRODUCTION inference.club (Phase 6 cutover).
#
# Registers as the REAL prod provider `club-host` (id 1) and joins the
# inference.club tailnet via tsnet, replacing the legacy docker `club-host`
# agent. The backend mints an ephemeral, tagged Tailscale auth key on register
# and reaches the agent at club-host-1:443 over the tailnet.
#
# CUTOVER ORDER MATTERS: stop the legacy docker `club-host` agent FIRST so its
# ephemeral tailnet device (club-host-1) is removed, otherwise this pod joins as
# club-host-1-1 and the backend can't reach it.
#
# install (key passed at the CLI, never committed):
#   helm upgrade --install agent \
#     ~/git/inference-club-agent/charts/inference-club-agent \
#     -n inference-club -f clusters/home/agent/values-prod.yaml \
#     --set apiKey.value=$INFERENCE_CLUB_PROD_KEY
clubUrl: https://api.inference.club
agentName: club-host
discovery:
  mode: kubernetes
  interval: 30s
# Tailnet mode (NOT direct): tsnet brings up club-host-1 inside the tailnet.
direct:
  enabled: false
listenPort: 443
service:
  # Unused in tailnet mode (ingress is via tsnet, not the pod IP) — keep it a
  # plain ClusterIP rather than grabbing LAN IPs with a LoadBalancer.
  type: ClusterIP
  port: 443
# emptyDir (not a PVC) on purpose: a local-path PVC would pin the pod to one
# node, blocking reschedule if that node dies. The trade-off is that each boot
# joins the tailnet as a BRAND-NEW device — and because these devices are NOT
# ephemeral (Ephemeral:false in tsnet + a non-ephemeral static authkey), the
# previous club-host-1 device lingers and squats the name, so Tailscale
# uniquifies the new node to club-host-1-1 (then -2, ...). That used to break
# the backend, which dialed the canonical hostname club-host-1.
#
# That's now safe: the agent reports its real tailnet IP on every heartbeat and
# the backend dials that IP (routes straight over WireGuard, no MagicDNS), so a
# renamed node is reached regardless. The lingering club-host-1* devices are
# harmless but accumulate in the Tailscale admin console — prune them
# occasionally, or wire up the OAuth ephemeral-key path so they self-reap.
persistence:
  enabled: false

# Cluster control center (PRD 21).
image:
  tag: prd21-scale
controlToken:
  enabled: true
  secretName: agent-control-token-prod
  secretKey: token
# Keep the agent on the amd64 GPU boxes (a2/a3) and OFF the arm64 Spark: the
# agent image is amd64, and Spark's VRAM is reserved for inference. nodeAffinity
# (not a single nodeSelector) so it can still reschedule between a2 and a3 if one
# node dies — preserving the emptyDir/no-PVC reschedulability this chart wants.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [a2, a3]
