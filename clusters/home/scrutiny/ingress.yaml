apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scrutiny
  namespace: scrutiny
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Scrutiny"
    gethomepage.dev/description: "S.M.A.R.T. disk health — every drive, every node"
    gethomepage.dev/group: "Infra"
    gethomepage.dev/icon: "scrutiny.png"
    gethomepage.dev/href: "https://scrutiny.lan/"
    gethomepage.dev/pod-selector: "app=scrutiny-web"
spec:
  ingressClassName: traefik
  tls:
    - hosts: ["scrutiny.lan"]
      secretName: scrutiny-tls
  rules:
    - host: scrutiny.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scrutiny-web
                port:
                  number: 8080
