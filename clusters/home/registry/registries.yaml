# DEPRECATED — scripts/k3s-registries.sh is now the canonical per-node
# registries.yaml (Harbor pull-through mirrors + this legacy 30500 block).
# This file remains only as documentation of the old in-cluster registry:2;
# delete it (and the 30500 blocks in the script) once rampart + nemotron-asr
# images migrate to Harbor.
#
# Tells containerd the LAN registry on a3 speaks plain HTTP (no TLS), so pulls of
# 192.168.5.173:30500/<repo>:<tag> don't fail with "server gave HTTP response to
# HTTPS client". See clusters/home/registry/registry.yaml for the registry itself.
mirrors:
  "192.168.5.173:30500":
    endpoint:
      - "http://192.168.5.173:30500"
configs:
  "192.168.5.173:30500":
    tls:
      insecure_skip_verify: true
