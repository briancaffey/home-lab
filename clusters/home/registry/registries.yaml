# k3s per-node registry config — install at /etc/rancher/k3s/registries.yaml on
# every node that pulls from the in-cluster registry, then restart k3s:
#   server (a3):  sudo systemctl restart k3s
#   agents:       sudo systemctl restart k3s-agent
#
# Tells containerd the LAN registry on a3 speaks plain HTTP (no TLS), so pulls of
# 192.168.5.173:30500/<repo>:<tag> don't fail with "server gave HTTP response to
# HTTPS client". See clusters/home/registry/registry.yaml for the registry itself.
mirrors:
  "192.168.5.173:30500":
    endpoint:
      - "http://192.168.5.173:30500"
configs:
  "192.168.5.173:30500":
    tls:
      insecure_skip_verify: true
