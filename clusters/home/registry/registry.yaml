# In-cluster Docker registry (R7 decision: in-cluster registry over GHCR-private).
# Home for locally-built images (nemotron-asr, acestep, trellis2, ltx2, …) so the
# big base layers stay on the LAN instead of fighting GHCR over WiFi, and every
# node pulls from one place.
#
# WHERE IT LIVES: pinned to a3, data persisted on a3's 2.6 TB disk at
# /mnt/d/registry (hostPath). a3 also has docker, so images built on a3 push to
# 127.0.0.1:30500 over loopback — no network, and docker auto-treats 127.0.0.0/8
# as an insecure registry so no daemon.json edits are needed on the build host.
#
# HOW NODES REACH IT: NodePort 30500 (hostPort doesn't bind under k3s's portmap
# CNI — see studio-voice). All nodes reach a3 on the LAN at 192.168.5.173, so the
# registry address cluster-wide is 192.168.5.173:30500.
#
# PER-NODE PULL CONFIG (required once per node, needs root): plain HTTP, so each
# node's containerd must be told the registry is insecure. Create
# /etc/rancher/k3s/registries.yaml with:
#   mirrors:
#     "192.168.5.173:30500":
#       endpoint: ["http://192.168.5.173:30500"]
#   configs:
#     "192.168.5.173:30500":
#       tls: { insecure_skip_verify: true }
# then restart k3s (server: `systemctl restart k3s`; agents: `systemctl restart
# k3s-agent`). Images are then referenced as 192.168.5.173:30500/<repo>:<tag>.
#
# Deploy:  kubectl apply -f clusters/home/registry/registry.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  replicas: 1
  strategy:
    type: Recreate # single hostPath-backed store
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      nodeSelector:
        inference-club.com/box: a3
      containers:
        - name: registry
          image: registry:2
          env:
            - name: REGISTRY_HTTP_ADDR
              value: ":5000"
            # Allow `docker manifest`/blob deletes so old image versions can be
            # garbage-collected later.
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            # Permit cross-repo blob mounts and large layers (the NeMo/pytorch
            # base layers are multi-GB).
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
          ports:
            - name: registry
              containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: registry
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: data
          hostPath:
            path: /mnt/d/registry
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - name: registry
      port: 5000
      targetPort: registry
      nodePort: 30500
