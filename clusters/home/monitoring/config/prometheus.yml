global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: home

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # vLLM engine(s). Add more targets here as instances come online.
  # The endpoint is the host IP:port of the vLLM OpenAI server; metrics
  # are unauthenticated at /metrics.
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets:
          - "192.168.6.19:8000"   # spark (DGX Spark / GB10)
        labels:
          node: spark

  # NVIDIA DCGM exporter — per-GPU metrics (DaemonSet, hostPort 9400).
  # a2 is parked (NVML mismatch) and spark needs an arm64 tag — add when ready.
  - job_name: dcgm
    static_configs:
      - targets: ["192.168.5.253:9400"]   # a1
        labels: { node: a1 }
      - targets: ["192.168.5.173:9400"]   # a3
        labels: { node: a3 }

  # vram-reporter — per-pod GPU VRAM attribution (DaemonSet, hostPort 9401).
  # Splits a shared GPU's memory across the services using it — the breakdown
  # dcgm can't give. Covers all four GPU nodes incl. the Spark (GB10), where
  # dcgm can't read the unified framebuffer. The `node` label is set by the
  # exporter itself (from spec.nodeName), so targets here carry none.
  - job_name: gpu-vram
    metrics_path: /metrics
    static_configs:
      - targets:
          - "192.168.5.253:9401"   # a1
          - "192.168.5.96:9401"    # a2
          - "192.168.5.173:9401"   # a3
          - "192.168.6.19:9401"    # spark (GB10)

  # node-exporter — host metrics (DaemonSet, hostPort 9100, all nodes).
  - job_name: node
    static_configs:
      - targets: ["192.168.5.253:9100"]   # a1
        labels: { node: a1 }
      - targets: ["192.168.5.96:9100"]    # a2
        labels: { node: a2 }
      - targets: ["192.168.5.173:9100"]   # a3
        labels: { node: a3 }
      - targets: ["192.168.6.19:9100"]    # spark
        labels: { node: spark }
      - targets: ["192.168.5.174:9100"]   # x1
        labels: { node: x1 }
      - targets: ["192.168.4.35:9100"]    # t430 (CPU agent, .4.x subnet)
        labels: { node: t430 }

  # NOTE: no LiteLLM /metrics scrape. LiteLLM's native Prometheus endpoint is an
  # enterprise/premium feature — on the OSS image /metrics 404s, and because the
  # scrape carries no API key each hit tripped user_api_key_auth ("No api key
  # passed in.") and was traced to Phoenix as an exception (hundreds/min of noise).
  # For gateway usage/spend, use the LiteLLM Admin UI (Postgres-backed) or Phoenix.

  # Speedtest Tracker — WAN/ISP speed (scheduled hourly). The /prometheus endpoint
  # must be enabled in the app (Settings → Data Integration → Prometheus). Scraped
  # in-cluster via cluster DNS; slow job (data changes hourly) so a 60s interval.
  - job_name: speedtest
    metrics_path: /prometheus
    scrape_interval: 60s
    static_configs:
      - targets: ["speedtest.speedtest.svc.cluster.local:80"]

  # Prometheus scraping itself.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
