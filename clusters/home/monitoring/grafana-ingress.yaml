# Exposes Grafana at https://grafana.lan/ via Traefik, and registers it on
# Homepage (gethomepage.dev) through the discovery label + annotations.
# TLS secret `grafana-tls` is created out-of-band by scripts/lan-certs.sh
# (mkcert key never lives in git — see .gitignore).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  annotations:
    # enabled must be an ANNOTATION (not a label) for Homepage discovery.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/description: "Metrics & dashboards"
    # Grafana's custom deploy uses label app=grafana (not app.kubernetes.io/name),
    # so tell Homepage how to find the pod for its status indicator.
    gethomepage.dev/pod-selector: "app=grafana"
    gethomepage.dev/group: "Observability"
    gethomepage.dev/icon: "grafana.png"
    gethomepage.dev/href: "https://grafana.lan/"
spec:
  ingressClassName: traefik
  tls:
    - hosts: ["grafana.lan"]
      secretName: grafana-tls
  rules:
    - host: grafana.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
