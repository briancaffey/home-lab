apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - namespace.yaml
  - prometheus.yaml
  - grafana.yaml
  - grafana-ingress.yaml
  - prometheus-ingress.yaml
  - dcgm-exporter.yaml
  - vram-reporter.yaml
  - node-exporter.yaml
  - alertmanager.yaml
  - karma.yaml

generatorOptions:
  # Stable ConfigMap/Secret names (no hash suffix) so the Deployment volume
  # references stay fixed. Reloader (clusters/home/reloader) restarts the
  # annotated deployments automatically when their CM content changes.
  disableNameSuffixHash: true

configMapGenerator:
  - name: prometheus-config
    files:
      - config/prometheus.yml
  - name: prometheus-rules
    files:
      - config/vllm-alerts.yml
      - config/homelab-alerts.yml
  - name: grafana-datasources
    files:
      - config/grafana-datasources.yml
  - name: grafana-dashboards-provider
    files:
      - config/grafana-dashboards-provider.yml
  - name: grafana-dashboards
    files:
      - dashboards/vllm.json
      - dashboards/nvidia-dcgm.json
      - dashboards/speedtest.json
      - dashboards/gpu-vram.json
      - dashboards/gpu-fleet.json

secretGenerator:
  - name: grafana-admin
    literals:
      # Initial admin login — CHANGE THIS in the Grafana UI after first login
      # (Profile → Change Password) and store the new one in 1Password.
      - admin-user=admin
      - admin-password=changeme
