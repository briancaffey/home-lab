apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Build/apply with the standalone kustomize binary:
#   kustomize build --enable-helm clusters/home/open-webui | kubectl apply -f -
# Requires secrets (created out-of-band, not in git):
#   - openwebui-tls       (scripts/lan-certs.sh)
#   - openwebui-litellm   (api-key = litellm master key; see README)

resources:
  - namespace.yaml

helmCharts:
  - name: open-webui
    repo: https://helm.openwebui.com
    version: 14.11.0
    releaseName: open-webui
    namespace: open-webui
    valuesFile: values.yaml
