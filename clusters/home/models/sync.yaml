# MinIO fan-out for the 3D gallery. Mirrors generations/3d/ → the models-data
# PVC and regenerates manifest.json (the list the gallery page fetches). Runs on
# a2. Needs Secret `minio-generations` in this namespace.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: models-sync
spec:
  # Retiring with the gallery — no new syncs. The last-synced models-data PVC
  # (generations/3d/) is preserved for a possible migration into a Manyfold
  # library. See the Forgejo retire issue.
  suspend: true
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            inference-club.com/box: a2
          containers:
            - name: mc
              image: minio/mc:latest
              env:
                - name: S3_ENDPOINT
                  value: http://minio.platform.svc:9000
                - name: ACCESS
                  valueFrom:
                    secretKeyRef: { name: minio-generations, key: access-key }
                - name: SECRET
                  valueFrom:
                    secretKeyRef: { name: minio-generations, key: secret-key }
              command:
                - sh
                - -ec
                - |
                  mc alias set m "$S3_ENDPOINT" "$ACCESS" "$SECRET"
                  mc mirror --overwrite --remove --exclude '.keep' --exclude 'manifest.json' m/generations/3d/ /data/
                  # Regenerate manifest.json (JSON array of mesh filenames).
                  cd /data
                  printf '[' > manifest.json
                  first=1
                  for f in *.glb *.gltf; do
                    [ -e "$f" ] || continue
                    if [ "$first" -eq 0 ]; then printf ',' >> manifest.json; fi
                    printf '"%s"' "$f" >> manifest.json
                    first=0
                  done
                  printf ']' >> manifest.json
                  echo "manifest:"; cat manifest.json; echo
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: models-data
