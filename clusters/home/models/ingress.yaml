apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: models
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "3D Gallery"
    gethomepage.dev/description: "trellis2 meshes, model-viewer (a2)"
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "mdi-cube-outline"
    gethomepage.dev/href: "https://models.lan/"
    gethomepage.dev/pod-selector: "app=models-gallery"
spec:
  ingressClassName: traefik
  tls:
    - hosts: ["models.lan"]
      secretName: models-tls
  rules:
    - host: models.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: models-gallery
                port:
                  number: 80
