apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
  # .glb/.gltf meshes + the generated manifest.json. Written by models-sync
  # (RW), served by nginx (RO). Both pinned to a2.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: models-gallery
spec:
  # RETIRING — superseded by Manyfold (clusters/home/manyfold, manyfold.lan).
  # Scaled to 0 and dropped from Homepage pending full removal (see Forgejo issue).
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: models-gallery
  template:
    metadata:
      labels:
        app: models-gallery
    spec:
      nodeSelector:
        inference-club.com/box: a2
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "20m"
              memory: 32Mi
          volumeMounts:
            # Static gallery page (from the configMap, kustomize-hashed name).
            - name: index
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            # The synced meshes + manifest.json, served at /models/.
            - name: data
              mountPath: /usr/share/nginx/html/models
              readOnly: true
      volumes:
        - name: index
          configMap:
            name: models-index
        - name: data
          persistentVolumeClaim:
            claimName: models-data
---
apiVersion: v1
kind: Service
metadata:
  name: models-gallery
spec:
  selector:
    app: models-gallery
  ports:
    - name: http
      port: 80
      targetPort: http
