apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Helm chart inflated by kustomize. Build/apply with the STANDALONE kustomize
# binary (kubectl's embedded one is too old for Helm v3+/v4):
#   kustomize build --enable-helm clusters/home/headlamp | kubectl apply -f -
# Requires the TLS secret `headlamp-tls` — see scripts/lan-certs.sh.

resources:
  - namespace.yaml

helmCharts:
  - name: headlamp
    repo: https://kubernetes-sigs.github.io/headlamp/
    version: 0.43.0
    releaseName: headlamp
    namespace: headlamp
    valuesFile: values.yaml
