# Stable .lan hostnames for every inference service, so scripts/containers can
# say https://omni.lan/v1/... instead of memorizing IP:port pairs. One Traefik
# Ingress per service, all in the inference-club namespace, all sharing the
# `inference-tls` mkcert secret (the cert's *.lan wildcard SAN covers every
# name here — no per-host cert entries needed; the secret is minted by
# scripts/lan-certs.sh).
#
# Homepage: each ingress carries gethomepage annotations → an "Inference"
# group (pinned to the top via the homepage layout). Tiles link to the
# service's /docs (FastAPI/Swagger) where one exists; siteMonitor probes the
# in-cluster Service so the tile shows up/down truthfully — parked services
# (replicas 0) simply show as down until scaled up.
#
# Naming: short, memorable, one label:
#   omni.lan asr.lan magpie.lan flux.lan ltx.lan studio-voice.lan
#   firecrawl.lan acestep.lan dia.lan trellis.lan lmstudio.lan
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lan-nemotron-omni
  namespace: inference-club
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "nemotron-omni"
    gethomepage.dev/description: "vLLM omni LLM (spark)"
    gethomepage.dev/group: "Inference"
    gethomepage.dev/icon: "mdi-brain"
    gethomepage.dev/href: "https://omni.lan/docs"
    gethomepage.dev/pod-selector: "app=nemotron-omni"
    gethomepage.dev/siteMonitor: "http://nemotron-omni.inference-club:8000/health"
spec:
  ingressClassName: traefik
  tls: [{ hosts: ["omni.lan"], secretName: inference-tls }]
  rules:
    - host: omni.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: nemotron-omni, port: { number: 8000 } } }
