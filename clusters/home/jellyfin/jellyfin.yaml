apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
  # default storageClass (local-path) — node-local; pinned to a2 with the pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      enableServiceLinks: false
      # Pinned to a2: media + config live there. Shares a2's 4090 for NVENC
      # hardware transcoding (runtimeClassName nvidia, no exclusive claim).
      nodeSelector:
        inference-club.com/box: a2
      runtimeClassName: nvidia
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          ports:
            - name: http
              containerPort: 8096
          env:
            # "all" includes the `video` capability needed for NVENC/NVDEC.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
          resources:
            requests:
              cpu: "200m"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            - name: media
              mountPath: /media
            - name: captures
              mountPath: /captures
              readOnly: true
            - name: downloads
              mountPath: /downloads
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: cache
          emptyDir: {}
        # writable media library on a2's root partition (add movies/tv/music here)
        - name: media
          hostPath:
            path: /home/brian/media
            type: Directory
        # existing screen recordings on the read-only NTFS drive
        - name: captures
          hostPath:
            path: /home/brian/e/Videos
            type: Directory
        # qBittorrent's landing dir (clusters/home/qbittorrent) — read-only;
        # the scanner ignores non-media files, and in-progress downloads live
        # in .incomplete/ (dot-dir, skipped by Jellyfin) until complete.
        - name: downloads
          hostPath:
            path: /home/brian/e/downloads
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
spec:
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Direct LAN access for clients that can't resolve the `jellyfin.lan` name and
# don't want a TLS cert prompt — e.g. Apple TV (Swiftfin / VLC). The hostname
# ingress only answers to `jellyfin.lan`; this NodePort serves Jellyfin's HTTP
# port on every node IP, so any device on the LAN can use:
#     http://192.168.5.173:30096   (or any other node IP)
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-direct
spec:
  type: NodePort
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: http
      nodePort: 30096
