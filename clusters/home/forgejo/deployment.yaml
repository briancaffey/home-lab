apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels: { app: forgejo }
spec:
  replicas: 1
  strategy: { type: Recreate }      # RWO volume — never two pods at once
  selector:
    matchLabels: { app: forgejo }
  template:
    metadata:
      labels: { app: forgejo }
    spec:
      nodeSelector:
        kubernetes.io/hostname: a2   # data PV is pinned to a2's E drive
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15.0.3
          env:
            # Container app user = uid/gid 1000 (matches the E-drive dir owner).
            - { name: USER_UID, value: "1000" }
            - { name: USER_GID, value: "1000" }
            # app.ini via FORGEJO__<section>__<KEY>. SQLite keeps it single-file/simple.
            - { name: FORGEJO__database__DB_TYPE, value: "sqlite3" }
            - { name: FORGEJO__server__DOMAIN, value: "forgejo.lan" }
            - { name: FORGEJO__server__ROOT_URL, value: "https://forgejo.lan/" }
            - { name: FORGEJO__server__HTTP_PORT, value: "3000" }
            - { name: FORGEJO__server__START_SSH_SERVER, value: "false" }  # push over HTTPS
            - { name: FORGEJO__service__DISABLE_REGISTRATION, value: "true" }  # no open signups
          ports:
            - { name: http, containerPort: 3000 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 2Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
