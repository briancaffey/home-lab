apiVersion: apps/v1
kind: Deployment
metadata:
  name: rampart
  namespace: rampart
  labels: { app: rampart }
spec:
  replicas: 1
  selector:
    matchLabels: { app: rampart }
  template:
    metadata:
      labels: { app: rampart }
    spec:
      # CPU-only and tiny (~19M-param ONNX model). No PVC: weights are baked
      # into the image; session tables are in-memory by design (Rampart's
      # entity table is meant to be ephemeral). Pinned to a1 because it's the
      # only amd64 node whose containerd trusts the 30500 registry — move to
      # a2 alongside TODO(a2-harbor-trust) below.
      nodeSelector:
        kubernetes.io/hostname: a1
      containers:
        - name: rampart
          # Also pushed to harbor.lan/library/rampart:v0.1.3 — switch back once
          # a2 trusts the Harbor CA (sudo scripts/trust-harbor-ca.sh on a2).
          # TODO(a2-harbor-trust)
          image: 192.168.5.173:30500/rampart:v0.1.3
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: SESSION_TTL_MS, value: "3600000" }  # 1h placeholder-table retention
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { memory: 768Mi }
