apiVersion: apps/v1
kind: Deployment
metadata:
  name: rampart
  namespace: rampart
  labels: { app: rampart }
spec:
  replicas: 1
  selector:
    matchLabels: { app: rampart }
  template:
    metadata:
      labels: { app: rampart }
    spec:
      # CODE LIVES AT forgejo.lan/brian/rampart — push there and CI builds,
      # pushes harbor.lan/apps/rampart:<sha12>, and commits the tag bump into
      # THIS file ([skip ci]); Argo deploys it. Don't edit the image tag by
      # hand unless breaking glass.
      # CPU-only and tiny (~19M-param ONNX model). No PVC: weights are baked
      # into the image; session tables are in-memory by design (Rampart's
      # entity table is meant to be ephemeral). Image is amd64-only, hence the
      # arch selector; beyond that the scheduler picks (all nodes trust
      # harbor.lan since home-lab#28).
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: rampart
          image: harbor.lan/apps/rampart:bca5e8703b41
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: SESSION_TTL_MS, value: "3600000" }  # 1h placeholder-table retention
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { memory: 768Mi }
