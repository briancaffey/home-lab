# Hermes Agent (Nous Research) — one container runs BOTH the gateway (OpenAI-
# compatible API, :8642) and the dashboard (:9119): the image's s6-overlay
# supervises the gateway service, and HERMES_DASHBOARD=1 turns on the
# supervised dashboard service (binds 0.0.0.0:9119 by default in-container).
#
# The container must START as root: the s6 stage2 hook chowns /opt/data,
# seeds config, then drops every service to the internal `hermes` user
# (uid 10000) via s6-setuidgid. Don't set runAsUser.
#
# Out-of-band secret (values in Vaultwarden — Automation collection):
#   kubectl -n hermes create secret generic hermes-secrets \
#     --from-literal=api-server-key="$(scripts/vault-secret.sh hermes-api-server-key)" \
#     --from-literal=litellm-api-key="$(scripts/vault-secret.sh litellm-key-hermes-agent)" \
#     --from-literal=dashboard-password="$(scripts/vault-secret.sh hermes-dashboard-password)" \
#     --from-literal=dashboard-session-secret="$(scripts/vault-secret.sh hermes-dashboard-session-secret)"
#
# Out-of-band secret #2 — Vaultwarden bot creds so the agent's `vault-secret`
# tool works (see vault-tools.yaml + skills/vaultwarden). Same bot account the
# laptop uses; values come FROM the local keychain, never disk/repo:
#   kubectl -n hermes create secret generic hermes-vault-bot \
#     --from-literal=clientid="$(security find-generic-password -a claude -s vaultwarden-bot-clientid -w)" \
#     --from-literal=clientsecret="$(security find-generic-password -a claude -s vaultwarden-bot-clientsecret -w)" \
#     --from-literal=password="$(security find-generic-password -a claude -s vaultwarden-bot-password -w)"
# ⚠ This gives the agent (and anything that can prompt it) read access to the
# WHOLE homelab vault — acceptable per home-lab#28 discussion; revisit with a
# scoped collection/second bot if Hermes ever faces untrusted input.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
spec:
  replicas: 1
  # Single writer over the sqlite-ish session/memory stores on the PVC —
  # never two pods on the same /opt/data.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      # A Service named `hermes` would inject HERMES_PORT=tcp://... env vars,
      # which collide with the image's HERMES_* config parsing.
      enableServiceLinks: false
      # kubectl "hand" (rbac.yaml): cluster-wide read + edit in inference-club.
      # kubectl uses the auto-mounted SA token — no kubeconfig anywhere.
      serviceAccountName: hermes
      # x1: CPU-only box — Hermes is a Python brain, never needs a GPU.
      nodeSelector:
        inference-club.com/box: x1
      initContainers:
        # Seed config.yaml on first boot only; the PVC copy is live after that.
        - name: seed-config
          image: busybox:1.38
          command: ["sh", "-c", "[ -f /opt/data/config.yaml ] && echo 'config exists, not seeding' || cp /seed/config.yaml /opt/data/config.yaml"]
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            - { name: seed, mountPath: /seed }
        # hermes-otel needs the OTel SDK importable by the hermes venv, but
        # /opt/hermes/.venv is root-owned/read-only at runtime. Until x1
        # trusts the Harbor CA (sudo scripts/trust-harbor-ca.sh on x1) we
        # can't pull the derived image (image/Dockerfile, already pushed as
        # harbor.lan/library/hermes-agent:v2026.6.19-otel) — so install the
        # libs onto the PVC once and expose them via PYTHONPATH below.
        # TODO(x1-harbor-trust): swap image to the Harbor tag and drop this
        # initContainer + the PYTHONPATH env.
        - name: install-otel-libs
          image: nousresearch/hermes-agent:v2026.6.19
          command: ["sh", "-c", "[ -d /opt/data/otel-libs/opentelemetry ] && echo 'otel libs present' || uv pip install --no-cache --target /opt/data/otel-libs opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp-proto-http"]
          volumeMounts:
            - { name: data, mountPath: /opt/data }
        # kubectl onto the PVC — /opt/data/.local/bin is already on the image's
        # PATH, so terminal tool calls find it with zero container changes.
        # Pinned to the server version (k3s v1.35.5). Same interim-vs-derived-
        # image story as install-otel-libs; fold into image/Dockerfile when
        # x1 trusts Harbor (TODO(x1-harbor-trust)).
        - name: install-kubectl
          image: nousresearch/hermes-agent:v2026.6.19
          command: ["sh", "-c", "[ -x /opt/data/.local/bin/kubectl ] && echo 'kubectl present' || (mkdir -p /opt/data/.local/bin && curl -fsSL -o /opt/data/.local/bin/kubectl https://dl.k8s.io/release/v1.35.5/bin/linux/amd64/kubectl && chmod +x /opt/data/.local/bin/kubectl)"]
          volumeMounts:
            - { name: data, mountPath: /opt/data }
        # Bitwarden CLI onto the PVC (same story as kubectl above) + the
        # vault-secret wrapper from the hermes-vault-tools ConfigMap. The
        # wrapper copies unconditionally so ConfigMap edits land on restart;
        # bw (a ~100 MB pkg'd Node binary, no unzip in image → python zipfile)
        # only downloads once. TODO(x1-harbor-trust): fold into image/Dockerfile.
        - name: install-vault-tools
          image: nousresearch/hermes-agent:v2026.6.19
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /opt/data/.local/bin
              if [ ! -x /opt/data/.local/bin/bw ]; then
                curl -fsSL -o /tmp/bw.zip https://github.com/bitwarden/clients/releases/download/cli-v2026.6.0/bw-linux-2026.6.0.zip
                python3 -m zipfile -e /tmp/bw.zip /opt/data/.local/bin/
                chmod +x /opt/data/.local/bin/bw
              fi
              cp /vault-tools/vault-secret /opt/data/.local/bin/vault-secret
              chmod +x /opt/data/.local/bin/vault-secret
              echo "vault tools ready: $(/opt/data/.local/bin/bw --version)"
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            - { name: vault-tools, mountPath: /vault-tools }
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.6.19
          # Keep the image ENTRYPOINT (/init = s6 PID 1); this is the CMD.
          args: ["gateway", "run"]
          ports:
            - { name: api, containerPort: 8642 }
            - { name: dashboard, containerPort: 9119 }
          env:
            # See install-otel-libs above; only OTel packages live there.
            - { name: PYTHONPATH, value: "/opt/data/otel-libs" }
            - { name: HERMES_DASHBOARD, value: "1" }
            # The API server is env-only config (not yet in config.yaml).
            - { name: API_SERVER_ENABLED, value: "true" }
            - { name: API_SERVER_HOST, value: "0.0.0.0" }
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef: { name: hermes-secrets, key: api-server-key }
            # Consumed via custom_providers[].key_env in config.yaml.
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef: { name: hermes-secrets, key: litellm-api-key }
            # Dashboard auth: non-loopback bind fails closed without a
            # provider; `basic` activates via these env vars.
            - { name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME, value: "brian" }
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef: { name: hermes-secrets, key: dashboard-password }
            - name: HERMES_DASHBOARD_BASIC_AUTH_SECRET
              valueFrom:
                secretKeyRef: { name: hermes-secrets, key: dashboard-session-secret }
            # hermes-otel → Arize Phoenix, in its own Phoenix project so
            # Hermes traces sit apart from the LiteLLM ones.
            - { name: OTEL_PHOENIX_ENDPOINT, value: "http://phoenix-svc.observability.svc.cluster.local:6006/v1/traces" }
            - { name: OTEL_PROJECT_NAME, value: "hermes-agent" }
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            # Bot creds as files (not env) so a stray `env` in a terminal tool
            # run doesn't dump them; vault-secret reads them from here.
            - { name: vault-bot, mountPath: /etc/vault-bot, readOnly: true }
            # mkcert root CA (public cert) — bw validates https://vault.lan
            # via NODE_EXTRA_CA_CERTS. ConfigMap kept fresh by lan-certs.sh.
            - { name: mkcert-ca, mountPath: /etc/mkcert, readOnly: true }
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              # headroom for in-pod tool runs (hyperframes render = headless
              # chromium + ffmpeg); x1 has 7.6Gi total.
              memory: 5Gi
          startupProbe:
            httpGet: { path: /health, port: api }
            periodSeconds: 5
            failureThreshold: 60   # first boot seeds state + starts s6 services
          livenessProbe:
            httpGet: { path: /health, port: api }
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health, port: api }
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: seed
          configMap:
            name: hermes-seed
        - name: vault-tools
          configMap:
            name: hermes-vault-tools
        - name: vault-bot
          secret:
            secretName: hermes-vault-bot
        - name: mkcert-ca
          configMap:
            name: mkcert-ca
