apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Hermes Agent (Nous Research) — cluster-hosted agent on x1. Forgejo issue #10.
# Apply with:
#   kubectl apply -k clusters/home/hermes
# Out-of-band prereqs:
#   - hermes-tls secret            (scripts/lan-certs.sh)
#   - hermes-secrets secret        (see deployment.yaml header; values in Vaultwarden)
#   - image in Harbor              (see image/Dockerfile header)
resources:
  - namespace.yaml
  - rbac.yaml
  - pvc.yaml
  - configmap.yaml
  - vault-tools.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Like `namespace: hermes`, but unsetOnly — a plain `namespace:` field stomps
# the cross-namespace RoleBinding (hermes-edit → inference-club) in rbac.yaml.
# Resources without an explicit namespace still land in `hermes`.
transformers:
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: hermes-ns
      namespace: hermes
    unsetOnly: true
