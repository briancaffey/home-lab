apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-config
data:
  # Broker (paperless-redis) + database (paperless-postgres). Password/secret
  # come from the out-of-band Secret `paperless-secret`.
  PAPERLESS_REDIS: redis://paperless-redis:6379
  PAPERLESS_DBHOST: paperless-postgres
  PAPERLESS_DBNAME: paperless
  PAPERLESS_DBUSER: paperless
  # CSRF / trusted origin — must match how you reach the UI.
  PAPERLESS_URL: https://paperless.lan
  PAPERLESS_OCR_LANGUAGE: eng
  PAPERLESS_TIME_ZONE: Etc/UTC
  # Superuser auto-created on first start (password from the Secret).
  PAPERLESS_ADMIN_USER: admin
  # Poll the consume dir (the MinIO fan-out mc-mirrors PDFs in; inotify can miss
  # those, polling every 30s is reliable).
  PAPERLESS_CONSUMER_POLLING: "30"
