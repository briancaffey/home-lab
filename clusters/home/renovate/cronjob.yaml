# Renovate — nightly dependency-update PRs against brian/home-lab on Forgejo
# (home-lab#29 GitOps). Scans pinned image tags (k8s manifests, kustomize
# images/helmCharts, Dockerfiles), checks upstream registries, opens PRs.
# Repo-side behavior lives in renovate.json at the repo root; this CronJob is
# only the scheduler. Renovate manages its own image tag below, so it
# self-updates via its own PRs.
#
# Out-of-band secret (token = dedicated Forgejo token, Vaultwarden item
# renovate-forgejo; scopes: read:user, write:repository, read:issue,
# write:issue):
#   kubectl -n renovate create secret generic renovate-secrets \
#     --from-literal=token="$(scripts/vault-secret.sh renovate-forgejo)" \
#     --from-literal=github-token="$(scripts/vault-secret.sh renovate-github)"
# (github-token = scopeless classic PAT: lifts rate limits + enables
# release-notes retrieval for PR descriptions.)
# The mkcert-ca ConfigMap comes from scripts/lan-certs.sh (bw/node + git both
# need it to trust forgejo.lan).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 6 * * *"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              image: renovate/renovate:43.255.0
              env:
                - { name: RENOVATE_PLATFORM, value: gitea }
                - { name: RENOVATE_ENDPOINT, value: "https://forgejo.lan/api/v1" }
                - { name: RENOVATE_REPOSITORIES, value: "brian/home-lab,brian/rampart" }
                - { name: RENOVATE_GIT_AUTHOR, value: "Renovate Bot <renovate@home-cluster.lan>" }
                - { name: RENOVATE_ONBOARDING, value: "false" }
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef: { name: renovate-secrets, key: token }
                - name: GITHUB_COM_TOKEN
                  valueFrom:
                    secretKeyRef: { name: renovate-secrets, key: github-token }
                - { name: NODE_EXTRA_CA_CERTS, value: /etc/mkcert/rootCA.pem }
                - { name: GIT_SSL_CAINFO, value: /etc/mkcert/rootCA.pem }
              volumeMounts:
                - { name: mkcert-ca, mountPath: /etc/mkcert, readOnly: true }
              resources:
                requests: { cpu: 250m, memory: 512Mi }
                limits: { memory: 2Gi }
          volumes:
            - name: mkcert-ca
              configMap:
                name: mkcert-ca
