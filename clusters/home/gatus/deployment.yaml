apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: gatus
  labels: { app: gatus }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO sqlite volume — never two writers
  selector:
    matchLabels: { app: gatus }
  template:
    metadata:
      labels: { app: gatus }
    spec:
      # Pin to a3 so the local-path PV binds alongside the monitoring stack.
      nodeSelector:
        kubernetes.io/hostname: a3
      containers:
        - name: gatus
          image: ghcr.io/twin/gatus:v5.36.0
          env:
            - { name: GATUS_CONFIG_PATH, value: /config/config.yaml }
          # SMTP creds for email alerting. `optional: true` → the pod still
          # starts if the secret is absent (email alerts stay disabled until
          # you create it — see docs/14). Never commit this secret.
          envFrom:
            - secretRef:
                name: gatus-secrets
                optional: true
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: gatus-config
        - name: data
          persistentVolumeClaim:
            claimName: gatus-data
