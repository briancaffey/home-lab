apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gatus

# Apply:  kubectl apply -k clusters/home/gatus
# Requires the TLS secret `gatus-tls` (add gatus.lan to scripts/lan-certs.sh and
# re-run it). Email alerting is OPTIONAL and off until you create the
# `gatus-secrets` secret with a Gmail app password (see docs/14).
#
# After editing configmap.yaml:  kubectl -n gatus rollout restart deploy/gatus
resources:
  - namespace.yaml
  - storage.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
