enableRbac: true

serviceAccount:
  create: true

# Required by Homepage v1.x or it rejects requests.
env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: "home.lan"

service:
  main:
    ports:
      http:
        port: 3000

ingress:
  main:
    enabled: true
    ingressClassName: traefik
    annotations:
      # enabled must be an ANNOTATION (not a label) for discovery to work.
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Homepage"
      gethomepage.dev/description: "Homelab dashboard"
      gethomepage.dev/group: "Cluster"
      gethomepage.dev/icon: "homepage.png"
    hosts:
      - host: home.lan
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: home-tls
        hosts:
          - home.lan

config:
  # Kubernetes integration (uses the RBAC service account) for auto-discovery
  # of any Ingress labeled gethomepage.dev/enabled: "true".
  kubernetes:
    mode: cluster
  docker: {}
  services: []
  bookmarks:
    - Homelab:
        - GitHub:
            - abbr: GH
              href: https://github.com/briancaffey
  widgets:
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
  settingsString: |
    title: Brian's Homelab
    headerStyle: boxed
