enableRbac: true

serviceAccount:
  create: true

# HOMEPAGE_ALLOWED_HOSTS + HOMEPAGE_VAR_TAILNET come from the out-of-band
# `homepage-tailnet` Secret via envFrom (tailnet name stays out of this
# public repo; Homepage substitutes {{HOMEPAGE_VAR_TAILNET}} in config).
# Recreate the secret with:
#   TN=$(scripts/vault-secret.sh tailnet-name)
#   kubectl -n homepage create secret generic homepage-tailnet \
#     --from-literal=HOMEPAGE_ALLOWED_HOSTS="home.lan,homepage.$TN.ts.net" \
#     --from-literal=HOMEPAGE_VAR_TAILNET="$TN" \
#     --dry-run=client -o yaml | kubectl apply -f -
# env MUST stay [] — the chart default sets HOMEPAGE_ALLOWED_HOSTS as a plain
# env entry (value null), and container `env` beats `envFrom`, which would
# silently break host validation.
env: []
envFrom:
  - secretRef:
      name: homepage-tailnet

service:
  main:
    ports:
      http:
        port: 3000

ingress:
  main:
    enabled: true
    ingressClassName: traefik
    annotations:
      # enabled must be an ANNOTATION (not a label) for discovery to work.
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Homepage"
      gethomepage.dev/description: "Homelab dashboard"
      gethomepage.dev/group: "Cluster"
      gethomepage.dev/icon: "homepage.png"
    hosts:
      - host: home.lan
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: home-tls
        hosts:
          - home.lan

# Custom Homepage icons served at /icons/<file> (reference in a service's
# gethomepage.dev/icon annotation as "/icons/milvus.png"). Icons live in
# clusters/home/homepage/icons/ and are loaded into the `homepage-icons`
# configMap (binary data). This configMap is created OUT OF BAND — re-run
# after adding/updating an icon:
#   kubectl -n homepage create configmap homepage-icons \
#     --from-file=clusters/home/homepage/icons/ \
#     --dry-run=client -o yaml | kubectl apply -f -
persistence:
  custom-icons:
    enabled: "true"
    type: custom
    volumeSpec:
      configMap:
        name: homepage-icons
    mountPath: /app/public/icons
    readOnly: true

config:
  # Kubernetes integration (uses the RBAC service account) for auto-discovery
  # of any Ingress labeled gethomepage.dev/enabled: "true".
  kubernetes:
    mode: cluster
  docker: {}
  # Static "Tailnet" group — remote-access tiles. The tailnet name arrives at
  # runtime via {{HOMEPAGE_VAR_TAILNET}} substitution (homepage-tailnet Secret),
  # so this is safe to commit. Auto-discovered .lan tiles are separate.
  services:
    - Tailnet:
        - Grafana:
            href: https://grafana.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: grafana.png
            description: Metrics & dashboards
        - Netdata:
            href: https://netdata.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: netdata.png
            description: Live per-node hardware metrics
        - Jellyfin:
            href: https://jellyfin.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: jellyfin.png
            description: Media server
        - Audiobookshelf:
            href: https://abs.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: audiobookshelf.png
            description: Audiobooks & podcasts
        - Open WebUI:
            href: https://openwebui.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: open-webui.png
            description: Chat with local LLMs
        - InvokeAI:
            href: https://invokeai.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: invoke-ai.svg
            description: Image generation
        - JupyterLab:
            href: https://jupyter.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: jupyter.png
            description: GPU notebooks
        - Headlamp:
            href: https://headlamp.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: headlamp.png
            description: Kubernetes dashboard
        - Harbor:
            href: https://harbor.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: harbor.png
            description: Container registry (UI)
        - Forgejo:
            href: https://forgejo.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: forgejo.png
            description: Self-hosted Git forge
        - Speedtest:
            href: https://speedtest.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: speedtest-tracker.png
            description: WAN/ISP speed tracker
        - Vaultwarden:
            href: https://vault.{{HOMEPAGE_VAR_TAILNET}}.ts.net
            icon: vaultwarden.png
            description: Passwords & secrets
  bookmarks:
    - Homelab:
        - GitHub:
            - abbr: GH
              href: https://github.com/briancaffey
    - Dashboards:
        - GPU Fleet Util:
            - icon: grafana.png
              href: https://grafana.lan/d/gpu-fleet
    # OpenAPI (/docs) pages for the long-lived inference services — the same
    # hostnames scripts/containers should target (clusters/home/inference-lan).
    - Inference API Docs:
        - nemotron-omni:
            - abbr: OM
              href: https://omni.lan/docs
        - nemotron-asr:
            - abbr: ASR
              href: https://asr.lan/docs
        - magpie-tts:
            - abbr: TTS
              href: https://magpie.lan/docs
        - flux2-klein:
            - abbr: IMG
              href: https://flux.lan/docs
        - ltx2:
            - abbr: VID
              href: https://ltx.lan/docs
        - studio-voice:
            - abbr: SV
              href: https://studio-voice.lan/docs
        - acestep:
            - abbr: MUS
              href: https://acestep.lan/docs
        - dia:
            - abbr: DIA
              href: https://dia.lan/docs
        - trellis2:
            - abbr: 3D
              href: https://trellis.lan/docs
        - firecrawl:
            - abbr: FC
              href: https://firecrawl.lan/admin/CHANGEME/queues
        - lmstudio:
            - abbr: LMS
              href: https://lmstudio.lan/v1/models
        - LiteLLM:
            - abbr: LLM
              href: https://litellm.lan/ui
        - hermes:
            - abbr: HRM
              href: https://hermes.lan/
  widgets:
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        locale: en-US
        format:
          timeStyle: short
          dateStyle: long
          hourCycle: h12
    - openmeteo:
        label: Washington, DC
        latitude: 38.9072
        longitude: -77.0369
        units: imperial
        cache: 5
  settingsString: |
    title: Brian's Homelab
    headerStyle: boxed
    # Pin the Inference group (auto-discovered from clusters/home/inference-lan
    # ingress annotations) to the top as a compact indicator row. Tailnet (the
    # static group in config.services above) renders as a compact 4-column
    # row — listing it here alone would hoist it to position #2, so the full
    # current group order is spelled out to keep everything where it is.
    layout:
      Inference:
        style: row
        columns: 4
      Media: {}
      Infra: {}
      Cluster: {}
      AI: {}
      Observability: {}
      Network: {}
      Monitoring: {}
      Security: {}
      Tailnet:
        style: row
        columns: 4
