apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - runtimeclass.yaml
  # NVIDIA device plugin (upstream, pinned). Patched to use the nvidia
  # RuntimeClass so it can see the GPU under k3s containerd.
  - https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.17.4/deployments/static/nvidia-device-plugin.yml
  # Node Feature Discovery (master + worker + CRDs). GPU-feature-discovery
  # writes feature files that nfd-worker reads and nfd-master turns into node
  # labels — the mechanism that surfaces nvidia.com/gpu.product + .memory.
  - https://github.com/kubernetes-sigs/node-feature-discovery/deployment/overlays/default?ref=v0.16.6
  # GPU-feature-discovery (vendored from device-plugin v0.17.4 with local edits:
  # kube-system ns, nvidia RuntimeClass, corrected pci-0300_10de affinity).
  - gpu-feature-discovery.yaml
  # GB10/DGX-Spark unified-memory label (GFD can't read it via NVML yet).
  - gb10-memory-rule.yaml
patches:
  # Device plugin needs the nvidia RuntimeClass to see the GPU under k3s.
  # It also carries runtimeClassName: nvidia, so it MUST only land on nodes that
  # actually have the nvidia containerd runtime (GPU nodes). Without an affinity
  # it schedules onto GPU-less nodes (e.g. x1) and the sandbox fails with
  # "no runtime for nvidia is configured". Gate it on the same NFD PCI label GFD
  # uses (NVIDIA display-class device present) so x1 and any future CPU/storage
  # node are excluded.
  - target:
      kind: DaemonSet
      name: nvidia-device-plugin-daemonset
    patch: |-
      - op: add
        path: /spec/template/spec/runtimeClassName
        value: nvidia
      - op: add
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: feature.node.kubernetes.io/pci-0300_10de.present
                      operator: In
                      values: ["true"]
  # nfd-master rejects label namespaces outside feature.node.kubernetes.io by
  # default; allow nvidia.com/* through so GFD's GPU labels are published.
  - target:
      kind: ConfigMap
      name: nfd-master-conf
      namespace: node-feature-discovery
    patch: |-
      - op: replace
        path: /data/nfd-master.conf
        value: |
          extraLabelNs: ["nvidia.com"]
