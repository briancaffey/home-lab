# GPU-feature-discovery (GFD), vendored from NVIDIA/k8s-device-plugin v0.17.4
# (deployments/static/gpu-feature-discovery-daemonset.yaml) with three local
# edits, all required to make it work on this k3s cluster:
#
#   1. namespace: kube-system            — co-locate with the device plugin.
#   2. runtimeClassName: nvidia          — same as the device plugin; GFD reads
#                                          GPU product/VRAM via NVML, which needs
#                                          the nvidia container runtime under k3s.
#   3. nodeAffinity → pci-0300_10de      — NFD v0.16 emits the PCI label as
#                                          `pci-0300_10de.present` (class_vendor),
#                                          not the legacy `pci-10de.present` the
#                                          upstream manifest hard-codes. All four
#                                          nodes (incl. the GB10 DGX Spark) carry
#                                          it, so GFD lands on every GPU node.
#
# GFD writes feature files to /etc/kubernetes/node-feature-discovery/features.d;
# nfd-worker reads that dir and nfd-master turns it into node labels
# (nvidia.com/gpu.product, nvidia.com/gpu.memory, nvidia.com/gpu.count, …) — the
# exact labels inference-club-agent's kubernetes discovery reads to fill each
# host's GPU model + VRAM. See docs/02-k8s-discovery.md.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-feature-discovery
  namespace: kube-system
  labels:
    app.kubernetes.io/name: gpu-feature-discovery
    app.kubernetes.io/version: 0.19.3
    app.kubernetes.io/part-of: nvidia-gpu
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-feature-discovery
      app.kubernetes.io/part-of: nvidia-gpu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-feature-discovery
        app.kubernetes.io/version: 0.19.3
        app.kubernetes.io/part-of: nvidia-gpu
    spec:
      runtimeClassName: nvidia
      containers:
        - image: nvcr.io/nvidia/k8s-device-plugin:v0.19.3
          name: gpu-feature-discovery
          # v0.19 defaults to publishing NodeFeature API objects (needs RBAC
          # + an NFD master that watches them). Our NFD pipeline is the
          # file-based one (features.d hostPath below), so keep file output.
          command: ["/usr/bin/gpu-feature-discovery", "--use-node-feature-api=false"]
          volumeMounts:
            - name: output-dir
              mountPath: "/etc/kubernetes/node-feature-discovery/features.d"
            - name: host-sys
              mountPath: "/sys"
          securityContext:
            privileged: true
          env:
            - name: MIG_STRATEGY
              value: none
            # Required since v0.19: GFD labels the node it runs on and
            # refuses to start without knowing which one that is.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              # NFD (v0.16) labels every node with an NVIDIA display-class PCI
              # device (vendor 10de, class 0300) — true for the RTX 4090 boxes
              # and the GB10 DGX Spark alike.
              - matchExpressions:
                  - key: feature.node.kubernetes.io/pci-0300_10de.present
                    operator: In
                    values: ["true"]
              # Escape hatch: force GFD onto a node by labeling it directly.
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values: ["true"]
      volumes:
        - name: output-dir
          hostPath:
            path: "/etc/kubernetes/node-feature-discovery/features.d"
            type: DirectoryOrCreate
        - name: host-sys
          hostPath:
            path: "/sys"
            type: Directory
