apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: trivy-system

# Helm-inflating dir (renders in Argo via --enable-helm). Reports land as
# CRDs: kubectl get vulnerabilityreports -A / configauditreports -A.
resources:
  - namespace.yaml

helmCharts:
  - name: trivy-operator
    repo: https://aquasecurity.github.io/helm-charts
    version: 0.34.0
    releaseName: trivy-operator
    namespace: trivy-system
    valuesFile: values.yaml
    includeCRDs: true   # report CRDs live in the chart's crds/ — kustomize
                        # excludes them by default (netdata/homepage charts
                        # have none, so this never bit before)
