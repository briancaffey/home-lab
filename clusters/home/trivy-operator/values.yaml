# Trivy Operator — continuous scanning of RUNNING workloads (home-lab#16).
# Complements Harbor's registry-side Trivy (auto_scan on apps/ + library/):
# Harbor scans what you STORE, the operator scans what you RUN (incl. all
# the upstream images that only pass through the proxy cache).
operator:
  # Gentle on the cluster: one scan job at a time.
  scanJobsConcurrentLimit: 1
  # Run a single in-cluster trivy-server (ClientServer mode) instead of
  # Standalone. In Standalone every scan job initializes its own trivy DB +
  # fs cache and they deadlock on the cache lock — 100% of scans failed with
  # "Failed to acquire cache or database lock … cache may be in use by another
  # process: timeout" → BackoffLimitExceeded (home-lab#99). ClientServer
  # centralizes the DB/cache in one trivy-server StatefulSet (its own PVC);
  # scan jobs become thin clients, so no lock contention and no per-scan DB
  # re-download. Setting this flag also overrides trivy.mode=ClientServer and
  # trivy.serverURL to the built-in service automatically.
  builtInTrivyServer: true
excludeNamespaces: "kube-system,trivy-system,inference-club"
# inference-club excluded for now: 10–20 GB CUDA/vLLM images make scan jobs
# heavy (the issue's own warning). Revisit with resource limits + timeout
# raised if inference-image vulns become interesting.
trivy:
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 2Gi }
  timeout: 15m0s
  # Scan-job pods don't trust the mkcert CA that signs harbor.lan's TLS, so
  # scanning our self-built harbor.lan/apps/* images failed with
  # "x509: certificate signed by unknown authority" → BackoffLimitExceeded.
  # The apps/ project is PUBLIC (no creds needed) and it's our own LAN
  # registry, so allow insecure TLS to harbor.lan only (home-lab#16).
  insecureRegistries:
    harborLan: harbor.lan

# Pin the operator + built-in trivy-server to a2 (amd64, most disk headroom).
# The server's DB cache is a local-path PVC (node-pinned), so it must NOT land
# on spark — spark is arm64 and frequently offline, which would strand the PVC
# and take all scanning down with it. a2 is a stable amd64 agent (home-lab#99).
nodeSelector:
  inference-club.com/box: a2
