# Trivy Operator — continuous scanning of RUNNING workloads (home-lab#16).
# Complements Harbor's registry-side Trivy (auto_scan on apps/ + library/):
# Harbor scans what you STORE, the operator scans what you RUN (incl. all
# the upstream images that only pass through the proxy cache).
operator:
  # Gentle on the cluster: one scan job at a time.
  scanJobsConcurrentLimit: 1
excludeNamespaces: "kube-system,trivy-system,inference-club"
# inference-club excluded for now: 10–20 GB CUDA/vLLM images make scan jobs
# heavy (the issue's own warning). Revisit with resource limits + timeout
# raised if inference-image vulns become interesting.
trivy:
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 2Gi }
  timeout: 15m0s
  # Scan-job pods don't trust the mkcert CA that signs harbor.lan's TLS, so
  # scanning our self-built harbor.lan/apps/* images failed with
  # "x509: certificate signed by unknown authority" → BackoffLimitExceeded.
  # The apps/ project is PUBLIC (no creds needed) and it's our own LAN
  # registry, so allow insecure TLS to harbor.lan only (home-lab#16).
  insecureRegistries:
    harborLan: harbor.lan
