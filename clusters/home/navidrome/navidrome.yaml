apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  # Navidrome's SQLite DB + search index (local-path, node-local on a2).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-music
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi
  # The music library. The MinIO fan-out (later) mc-mirrors
  # generations/music/ into this volume; Navidrome auto-scans it.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      nodeSelector:
        inference-club.com/box: a2
      containers:
        - name: navidrome
          image: deluan/navidrome:0.62.0
          env:
            - name: ND_MUSICFOLDER
              value: /music
            - name: ND_DATAFOLDER
              value: /data
            - name: ND_PORT
              value: "4533"
            # Scan the library periodically so fan-out drops show up.
            - name: ND_SCANSCHEDULE
              value: "5m"
          ports:
            - name: http
              containerPort: 4533
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: music
              mountPath: /music
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: navidrome-data
        - name: music
          persistentVolumeClaim:
            claimName: navidrome-music
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome
spec:
  selector:
    app: navidrome
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Direct LAN access for Subsonic clients (iOS Amperfy / play:Sub, Apple TV) that
# don't want a TLS-trust prompt — http://<any-node-ip>:30533.
apiVersion: v1
kind: Service
metadata:
  name: navidrome-direct
spec:
  type: NodePort
  selector:
    app: navidrome
  ports:
    - name: http
      port: 4533
      targetPort: http
      nodePort: 30533
