apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secret
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: litellm-secret
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef: { key: observability-litellm-secret, property: database-url }
    - secretKey: master-key
      remoteRef: { key: observability-litellm-secret, property: master-key }

