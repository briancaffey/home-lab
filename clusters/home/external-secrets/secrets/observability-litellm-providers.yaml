apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-providers
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: litellm-providers
    creationPolicy: Owner
  data:
    - secretKey: groq-api-key
      remoteRef: { key: observability-litellm-providers, property: groq-api-key }
    - secretKey: nvidia-api-key
      remoteRef: { key: observability-litellm-providers, property: nvidia-api-key }
    - secretKey: openrouter-api-key
      remoteRef: { key: observability-litellm-providers, property: openrouter-api-key }

