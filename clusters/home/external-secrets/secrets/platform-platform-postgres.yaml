apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-postgres
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: platform-postgres
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef: { key: platform-platform-postgres, property: password }

