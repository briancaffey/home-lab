apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: browserless-secret
  namespace: mcp
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: browserless-secret
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef: { key: mcp-browserless-secret, property: token }

