apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-secret
  namespace: mcp
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: searxng-secret
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef: { key: mcp-searxng-secret, property: secret-key }

