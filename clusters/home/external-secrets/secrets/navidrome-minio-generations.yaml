apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-generations
  namespace: navidrome
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: minio-generations
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef: { key: navidrome-minio-generations, property: access-key }
    - secretKey: secret-key
      remoteRef: { key: navidrome-minio-generations, property: secret-key }

