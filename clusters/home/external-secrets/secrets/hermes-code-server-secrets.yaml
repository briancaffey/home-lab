apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: code-server-secrets
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: code-server-secrets
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef: { key: hermes-code-server-secrets, property: password }

