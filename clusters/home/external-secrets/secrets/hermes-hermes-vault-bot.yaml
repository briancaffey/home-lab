apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-vault-bot
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: hermes-vault-bot
    creationPolicy: Owner
  data:
    - secretKey: clientid
      remoteRef: { key: hermes-hermes-vault-bot, property: clientid }
    - secretKey: clientsecret
      remoteRef: { key: hermes-hermes-vault-bot, property: clientsecret }
    - secretKey: password
      remoteRef: { key: hermes-hermes-vault-bot, property: password }

