apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-secrets
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: hermes-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-server-key
      remoteRef: { key: hermes-hermes-secrets, property: api-server-key }
    - secretKey: dashboard-password
      remoteRef: { key: hermes-hermes-secrets, property: dashboard-password }
    - secretKey: dashboard-session-secret
      remoteRef: { key: hermes-hermes-secrets, property: dashboard-session-secret }
    - secretKey: litellm-api-key
      remoteRef: { key: hermes-hermes-secrets, property: litellm-api-key }
    - secretKey: wandb-api-key
      remoteRef: { key: hermes-hermes-secrets, property: wandb-api-key }

