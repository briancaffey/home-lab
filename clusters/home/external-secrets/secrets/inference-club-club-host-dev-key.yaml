apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: club-host-dev-key
  namespace: inference-club
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: club-host-dev-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef: { key: inference-club-club-host-dev-key, property: api-key }

