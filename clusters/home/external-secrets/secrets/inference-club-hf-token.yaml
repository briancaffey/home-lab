apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hf-token
  namespace: inference-club
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: hf-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef: { key: inference-club-hf-token, property: token }

