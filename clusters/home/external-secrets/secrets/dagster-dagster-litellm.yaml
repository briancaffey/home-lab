apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dagster-litellm
  namespace: dagster
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: dagster-litellm
    creationPolicy: Owner
  data:
    - secretKey: LITELLM_API_KEY
      remoteRef: { key: dagster-dagster-litellm, property: LITELLM_API_KEY }

