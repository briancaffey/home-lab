apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-litellm
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vaultwarden, kind: ClusterSecretStore }
  target:
    name: n8n-litellm
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef: { key: n8n-n8n-litellm, property: api-key }

