# https://dagster.<tailnet>.ts.net  ->  dagster webserver:80
# Remote access to the Dagster UI over the tailnet (default-deny ACL; the
# operator proxy carries tag:k8s). Dagster OSS has no built-in auth, so keep
# this tailnet-only.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dagster-ts
  namespace: dagster
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: dagster-dagster-webserver
      port:
        number: 80
  tls:
    - hosts:
        - dagster
