apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace for our own resources (database.yaml/ingress.yaml). The n8n chart's
# templates don't hardcode .Release.Namespace, so under Argo CD the helm-inflated
# objects land in the Application's destination.namespace (n8n). For a MANUAL apply
# you must pass -n n8n:
#   kustomize build --enable-helm clusters/home/n8n | kubectl apply -n n8n -f -
namespace: n8n

# Build/apply with the STANDALONE kustomize v5 binary (kubectl's --enable-helm is
# broken with Helm v4 — see CLAUDE.md Gotchas). Argo CD renders this via the
# argocd-cm `kustomize.buildOptions: --enable-helm` patch.
#
# Secrets (created out-of-band, NOT in git — public repo):
#   - n8n-encryption-key   (key N8N_ENCRYPTION_KEY; stable forever — back up!)
#   - n8n-postgres-secret  (key postgres-password; see database.yaml)
#   - n8n-litellm          (key api-key; a LiteLLM virtual/master key)
#   - n8n-tls              (scripts/lan-certs.sh)

resources:
  - namespace.yaml
  - database.yaml
  - ingress.yaml

helmCharts:
  - name: n8n
    repo: https://community-charts.github.io/helm-charts
    version: 1.24.10 # Renovate tracks this
    releaseName: n8n
    namespace: n8n
    valuesFile: values.yaml
