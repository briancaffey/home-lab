# External Secrets Operator — reconciles cluster Secrets from Vaultwarden.
# Multi-source Argo app (chart + $values), same pattern as home-netdata.
# ServerSideApply because ESO's CRDs are large (client-side apply overflows,
# same reason argocd uses SSA). The Vaultwarden bridge + ClusterSecretStore +
# ExternalSecrets live in clusters/home/external-secrets/ and are applied
# separately once the operator + CRDs are up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.8.0
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/clusters/home/external-secrets/values.yaml
    - repoURL: https://forgejo.lan/brian/home-lab.git
      targetRevision: main
      ref: values
    - repoURL: https://forgejo.lan/brian/home-lab.git
      targetRevision: main
      path: clusters/home/external-secrets
      directory:
        recurse: true
        exclude: 'values.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  # ESO's mutating webhook fills in these spec defaults, which would otherwise
  # keep every ExternalSecret perpetually OutOfSync against the (minimal) git
  # manifests. Ignore the defaulted fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - '.spec.data[].remoteRef.conversionStrategy'
        - '.spec.data[].remoteRef.decodingStrategy'
        - '.spec.data[].remoteRef.metadataPolicy'
        - '.spec.target.deletionPolicy'
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
