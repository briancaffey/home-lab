# Homepage — second helm-release migration (netdata pattern). The June-2026
# "kubectl apply put it in the wrong namespace" incident class is retired:
# Argo renders the upstream chart with git values and applies with an
# explicit destination namespace. Tailnet privacy: values.yaml carries
# {{HOMEPAGE_VAR_TAILNET}} placeholders; the real name arrives via the
# out-of-band homepage-tailnet Secret (envFrom).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-homepage
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://jameswynn.github.io/helm-charts
      chart: homepage
      targetRevision: 2.1.0
      helm:
        releaseName: homepage
        valueFiles:
          - $values/clusters/home/homepage/values.yaml
    - repoURL: https://forgejo.lan/brian/home-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
---
# ── CIRCULARITY TRIO (see docs/18-gitops-break-glass.md) ─────────────────
# vaultwarden/harbor/forgejo are the services the GitOps loop itself stands
# on. Policy is deliberately weaker: commits deploy (automated) but
# selfHeal is OFF — Argo never autonomously restarts the foundations; drift
# shows as OutOfSync for a human. prune stays false permanently.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-vaultwarden
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://forgejo.lan/brian/home-lab.git
    targetRevision: main
    path: clusters/home/vaultwarden
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
---
# Harbor (trio 2/3) — helm-inflating dir with a twist: the chart REGENERATES
# four internal secrets + checksum pod-annotations on every render (verified
# empirically 2026-07-06 by double-render diff). Without the ignore rules
# below, Argo would be perpetually OutOfSync and every sync would rotate
# trust tokens and roll core/jobservice/registry. RespectIgnoreDifferences
# makes syncs leave those fields alone. Do NOT remove either half.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-harbor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://forgejo.lan/brian/home-lab.git
    targetRevision: main
    path: clusters/home/harbor
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  ignoreDifferences:
    - kind: Secret
      name: harbor-core
      jsonPointers: ["/data"]
    - kind: Secret
      name: harbor-jobservice
      jsonPointers: ["/data"]
    - kind: Secret
      name: harbor-registry
      jsonPointers: ["/data"]
    - kind: Secret
      name: harbor-registry-htpasswd
      jsonPointers: ["/data"]
    - group: apps
      kind: Deployment
      name: harbor-core
      jqPathExpressions:
        - .spec.template.metadata.annotations."checksum/secret"
        - .spec.template.metadata.annotations."checksum/secret-jobservice"
        - .spec.template.metadata.annotations."checksum/secret-core"
    - group: apps
      kind: Deployment
      name: harbor-jobservice
      jqPathExpressions:
        - .spec.template.metadata.annotations."checksum/secret"
        - .spec.template.metadata.annotations."checksum/secret-jobservice"
        - .spec.template.metadata.annotations."checksum/secret-core"
    - group: apps
      kind: Deployment
      name: harbor-registry
      jqPathExpressions:
        - .spec.template.metadata.annotations."checksum/secret"
        - .spec.template.metadata.annotations."checksum/secret-jobservice"
        - .spec.template.metadata.annotations."checksum/secret-core"
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
---
# Forgejo (trio 3/3) — THE self-referential one: Argo reads this very repo
# from the service this Application manages. selfHeal OFF is load-bearing
# here: Argo must never autonomously restart the thing it reads truth from.
# If forgejo breaks, fix it from the laptop clone with kubectl (docs/18) —
# the repo also lives on GitHub (push mirror) and every laptop clone.
# The Actions runner (runner/) is deliberately NOT included.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-forgejo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://forgejo.lan/brian/home-lab.git
    targetRevision: main
    path: clusters/home/forgejo
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
---
# ── INFERENCE FLEET (services/*) ──────────────────────────────────────────
# Plain-yaml dirs into inference-club. ONE fleet-wide rule: /spec/replicas
# is IGNORED on every Deployment (+RespectIgnoreDifferences) — scaling is
# operational state owned by Brian/Hermes (GPU bin-packing, park/unpark),
# never by git. Everything else selfHeals.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: svc-acestep
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://forgejo.lan/brian/home-lab.git
    targetRevision: main
    path: services/acestep
  destination:
    server: https://kubernetes.default.svc
    namespace: inference-club
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers: ["/spec/replicas"]
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
