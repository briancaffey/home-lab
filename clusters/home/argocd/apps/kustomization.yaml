# Application CRs. Bootstrap ONCE with `kubectl apply -f root.yaml` (after
# the Argo CD CRDs from ../ exist) — the root app then manages this whole
# directory from git; manual `kubectl apply -k` is only a fallback.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - root.yaml
  - hello-gitops.yaml
  - clusterscape.yaml
  - home-services.yaml
  - inference-club.yaml
