# Redis — shared cache / queue / rate-limit store for the platform (Phase A,
# docs/04). Stateless-ish (no persistence: --save "" --appendonly no), so no PVC;
# a restart is a cold cache, which is fine for a shared utility. Apps that need
# durable queues bring their own (firecrawl already does). Official multi-arch
# image, no pull secret. Pinned to a3 alongside the rest of the data layer.
#
# In-cluster: redis://redis.platform.svc.cluster.local:6379
#
# Deploy:  kubectl apply -f platform/redis/redis.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: platform
  labels: { app: redis }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      nodeSelector: { inference-club.com/box: a3 }
      containers:
        - name: redis
          image: redis:alpine
          command: ["redis-server", "--bind", "0.0.0.0", "--save", "", "--appendonly", "no", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ name: redis, containerPort: 6379 }]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 640Mi }
          readinessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: platform
  labels: { app: redis }
spec:
  selector: { app: redis }
  ports: [{ name: redis, port: 6379, targetPort: redis }]
